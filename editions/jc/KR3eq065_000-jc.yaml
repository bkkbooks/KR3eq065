body:
  text: 慈濟醫話序余自幼侍先慈疾垂三十年每延醫術之工拙不知也藥之溫涼不知也為人子而不知醫舉所以能已吾親之疾苦痛癢者悉委之他人而懵然不知所由不幸有變則曰天曰命一若與己無與焉者嗚呼不孝孰大於是偶從友人假得黃坤載醫書八種聽夕披覽初驚其議論高朗繼思之人之陰陽不能偏畸輕重寒症宜溫熱症宜涼此陰陽調燮一定之理百世不能易也黃氏專主扶陽抑陰疑非確論旋得柯韻伯喻嘉言陳修園徐靈胎陸九芝諸醫書始知醫之為道非深求農軒無以探其原非精研仲景無以窮其變世衰道微難遇明師指導而古書詞義奧衍注家又聚訟紛如與時醫談農軒仲景輒曰古方不能治今病余乃愈讀愈惑懼將自誤誤人遂置焉而廢讀者有年矣癸亥秋見報登內經註解初稿徵求教言啟語有根抵實獲我心下款署實善社啟亦未詳社址何所繼復續登註解數篇覽誦一過心目開朗何之不得其解者今如桶底脫矣不禁拍案曰斯世而競有斯人乎竟有註解內經如斯詳明者乎究不知注者為誰何因按日剪存備研誦無何登不數日遽絕止悵然如失者累日甲子春在署見祥君瑞年案頭有手抄內經註解數紙詳詢始知實善社之所在並敬審孫子云先生臨壇主講寄廬距社遠不能逐日往受教僅由數紙印刷品藉窺門徑然較昔時愈讀愈惑者豁然快慰多矣先生學通天人婆心救世註釋經論既已述大道而正其傳暇日復集群弟子即病症病情設論辯難既究病原兼詳治法提命之下學者手錄日久成帙顏曰醫話其癸亥年輯者為第一卷業經刊印行世茲又擬將甲子年輯者刊行藉廣仁慈而期博濟洵足拯救斯人而為功於造物其所繫豈淺鮮哉是為序歲在乙丑端陽徐道鴻謹序
