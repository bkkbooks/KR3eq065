body:
  text: 慈濟醫話卷一慈濟醫話癸亥夏季內經注重穀氣內經全部結晶即在穀氣反復申論總不離戊已部戊已部屬土土屬脾胃病皆由土而生土不生金金不剋木故治病當先以清胃養陰和肝為主宰學醫首要在讀本內二經古方有不適於今世者緣古今天之氣候不同人之嗜欲亦異古方由伊時經驗而得故宜於古不宜於今亦猶今醫本其心得著書立方於今固宜過千百年後因氣候嗜欲之轉移亦不適用矣故曰盡信書不如無書吾以為學醫初步當先肆力於內經神農書二種既明人身形臟變化之功能藥性生克之效力然後博採群書捨短取長以作參考庶不為書所欺蹈泥古鮮通之弊立方忌泥治病當盡力而為症變與否視彼命耳然用方不可過泥吾以書為成法故翻而新之諸子當以吾言為成法再翻而新之則更上一層矣今病多宜涼劑今日用涼藥每見奇功溫散一投立現敗象古方則用溫散法者居多論者咸懷疑焉蓋仲聖論醫乃言秋令傷寒宜用辛溫以扶陽與今之用涼藥以養陰清胃者其症不同其法亦異並非背道而馳且創始難改造易凡事愈進愈精不可泥古而廢今不可是今而非古奚懷疑為回憶二十年前曾用重涼劑例如石膏八兩生軍八錢尚難見效今則更宜加重緣近日燈燃煤油其光炫耀奪人元神其氣邪惡入人空竅耗散天真傷陰最甚故陰虧之人較昔尤多更加以不時御神故用柴桂必見敗象若大涼劑呈施之弱人無傷也兒病視指筋定之小孩視食指之筋則知病所由來者因商陽穴食指之端乃大腸之本穴下通隱白脾旁連少商肺及於湧泉腎故筋至商陽則胃敗良醫弗為其筋不現而病重者寒熱至極而閉也其筋現而病不重者偶感暴寒暴熱也寒熱內侵肺胃首當其衝故陽明筋現重長輕短乃寒熱侵感其筋所致也治痧疹之法凡人飲食之輸送以脾為君口鼻之呼吸以肺為君各病發源不由飲食之停滯則由口鼻之吸穢治病之本必先養陰而清胃然服藥胃當其衝故清胃尤重今人多謂痧疹宜散不宜降害人不可計數此症統發於胃肺二經輕者散之可以獲愈重者若一用散則以風生火而熱內陷矣吾對斯症以石膏清胃生軍降滯而為君故必重用臣以木通去小腸熱知母固其先天佐以鮮蘆根鮮生地以清肺以二花連翹去毒而為使再以生草和之視病之輕重而後用引治痧疹之用藥治痧疹之藥大黃可重用朴硝不可用者緣朴硝能瀉真陰大黃則有消瘀生新之功並能透表也論膈症膈症凡四種一由胃寒而得必畏酸心糟宜丁香為君二痰熱結於胃宜毛紅生軍大消之三血瘀胃間宜桃仁當門子破而散之四即消症宜活鹿尾血大補之此種最難治十可活六痰帶血治法痰中帶血治法以清肺涼肝為主佐以茅根重用藕汁為引他如杷葉鮮生地鮮石斛均可過兩用若花蕊石則性滯不宜多用溫病治法溫病燥糞既下正汗可出藥不能離蘆根薄荷大黃石膏引不能離紫雪牛黃散勞症治法勞病之午後發燒者因形神妄用虛極成勞午後陰正用事陰陽相爭上下不並陰與陽爭而外泄陽為陰格而內擾真陰不固故午後作燒治法應以大養陰品為君佐以真牛黃清心丸可冀萬一子後作燒天明盜汗作喘之勞症乃陽氣不足也子後陰將衰陽將盛陽氣外泄陰為所克故子後作燒天明盜汗作喘治法宜參宜耆或可萬一稍一不慎陰陽倒置死於藥矣今死於藥者十居八九傷哉肝症治法肝氣為熱症發源於心之不遂蓋木鬱則生火火生則土敗土敗之由因木盛有以克之治法在瀉肝以治本養陰以治標金木一平脾土自固若因土敗遂投養脾之品使之反助木火奚啻以油救火故參及首烏均不可用即耆亦不可重用也怪病治法人必先自迷而後鬼能迷之故吾醫怪病用藥而不用術凡遇鬼神之病在初起時用通關散開其竅用安宮牛黃丸清其內若附會鬼神而不醫以藥則瘋癲之症成矣肝瘋治法某婦症系肝瘋菌由臟內生手術難達毒藥難攻故為痼疾精神學吾素茫然然以理測之當與道家法相近道家治病有二法一因病家信仰心堅即利用之使其心專而蔽欲欲寡則神自易養而病可得愈二我自有純功五臟皆有餘氣運我身氣之有餘以補病者氣之不足是也故道家功夫皆本於易經法於內經用心性自養之法而成與精神學大概相通此疾吾有一法未卜效否使其打坐用玄牝法以左手握右手大指再用右手握左手先盤右膝次盤左膝心想兩目間之祖竅目微睜不可用不可睡以身上舒暢後將疲未疲而止地須靜室不拘何時及時之長短但須先緩腰帶腿帶使血流通心要專一悲喜胥忘一意注於祖竅暴風疾雨時不可入坐如識字者可誑讀經卷或格言每日若干遍謂長生之術在是令其心專神固聲發氣宣亦或收效於萬一也若服藥則不過涼肝化痰之品大黃木香適用何病大黃木香皆足傷氣然二者比較性各不同寒凝氣滯者宜用木香絶無傷氣之弊於氣虛者用之則破氣矣大黃有消瘀生新之功不過重用傷血耳脾濕啜粥法薏仁米半斤真建蓮四兩芡實米四兩合而熬成極爛之粥飢則用白糖調食不可鹹食一次熬出可用二三日慈濟醫話癸亥夏季六脈之部位左寸手少陰心與手太陽小腸相表裡關足厥陰肝與足少陽膽相表裡尺足少陰腎與足太陽膀胱相表裡右寸手太陰肺與手陽明大腸相表裡關足太陰脾與足陽明胃相表裡尺手厥陰心包與手少陽三焦相表裡左為脈之起處右為脈之會處尺為脈之根寸為脈之止左脈根於足少陰止於手少陰肝木居中樞故脈之起處根於足而止於手也右脈根於手厥陰心包通腎居下止於手太陰脾土居中樞故脈之會處根於手亦止於手也就五行言之左為脈之起處腎部居下又為天一生水故居左尺水生木為肝故居左關木生火為心故居左寸火生相火為心包故居右尺相火生土為脾故居右關土生金為肺故居右寸此五行相生之序也再就氣血言之腎主藏為陰中之至陰心主火火為陰中之陽心包生於心為陽少而陰多肺主氣為陰中之至陽此二氣相摩之理也左心小腸肝膽腎心與小腸是手少陰及手太陽肝與膽是足厥陰及足少陽腎是足少陰右肺大腸脾胃命肺與大腸是手太陰及手陽明脾與胃是足太陰及足陽明命是命門陰陽離合論之太陽起於至陰結於命門命門是兩目因心包之脈上通於肝下達於腎輸肝腎之精上注於目而放光明故孟子以眸子瞪睬證胸中正否也惟依上所述左右皆有臟腑尚少膀胱三焦心包三腑三者究居何處乎夫既一臟一腑相為表裡當然無二臟或二腑相為表裡之理此定例也關於手少陰與手太陽之相表裡可知足少陰與足太陽之相表裡足少陰腎居左尺則是太陽膀胱亦居左尺無疑也況腎與膀胱恰一臟一腑之相表裡也關於足厥陰與足少陽之相表裡可知手厥陰與手少陽之相表裡手厥陰心包既上通於目下達於腎因其通腎定居右尺則手少陽三焦亦居右尺無疑也況心包是別臟與三焦恰一臟一腑之相表裡也以肺為蓋以胃為釜以腎中相火為炊故能化穀氣而養形臟駁論為此說者就形跡言似亦近理不知實大謬也欲駁此論當先考人之五臟何臟有火火是何物各臟之火是何名詞果一一瞭解於心則肺蓋胃釜腎炊之說不攻自破蓋人賴天氣以溫氣血壯火乃六腑有餘之氣承天氣以成之者少火乃五臟所藏之血得天氣以溫之者壯火以小腸為主以三焦為散布於各臟之機關心得壯火而溫血名曰君火經過心包名曰相火由心包分布於四臟皆曰少火心與小腸相表裡小腸首先受胃之穀氣故小腸為腑之君火又以三焦首先受氣於膀胱其功用能升清降濁化水精而行於各臟故三焦為腑之相火壯火在胃能化五穀若謂胃為釜腎為炊則是臟腑不相連何能腎為胃之炊肺為胃之蓋即使相連謂胃無火賴相火為炊不識胃為肉質抑為鐵質如為肉質何堪火煉如為鐵質豈相火所能奏效若謂胃獨有火則上蒸肺下攻大腸恐致病久矣蓋火也者不過以天之生氣溫人之氣血而假定之名詞耳火恃長蟲短蟲為輸送長蟲居腑短蟲居臟所謂蛔蟲是也病時則為蟲為癆為痞等疾亦皆蟲所輸送要之同歸一理皆陰陽之作用而已說蟲五臟六腑各有水火氣血各有官守職司傳而不回有順進無逆行然能使水火氣血流通不滯者惟長短蟲之力而已長短蟲秉天地之氣承氣血所生其質熱其性動故有傳播氣血水火之能力俾收水火相濟之功至蟲之類別不一其種凡紅白血輪等蟲皆屬短蟲蛔蟲寸白等皆屬長蟲人罹病時則有輸送病氣之能力傳染病蟲為短蟲短蟲多秉臟中陽氣而生故涼藥能殺之間亦有用熱藥者長蟲多秉腑中陰氣而生故熱藥能殺之間亦有用涼藥者要之蟲為氣血所生當然能為氣血所化居人體中質皆屬熱但須究其所生屬陰屬陽然後對症施藥庶幾近之醫者用藥之難今人動謂醫理難用藥易不知用藥之難更難於醫理不明醫理固不可用藥醫理明矣而不善用藥仍未必收效也病如猛虎醫如獵戶藥如弓矢持滿而發射之必中中之必痊可以為醫矣若見病之時理亦明弓矢亦備乃膽小而力卻或膽大而力猛則縱虎歸山致遺後患過與不及均失也況醫理未諳亂用虎狼之藥品以輕於嘗試反曰用藥易醫理難籲病毒未減藥毒又增方寸幾何詎堪內外寇之交鬨不死於病將死於藥人之性命保存者幸也立方時宜慎之點立方先須認症知邪氣之所倚伏正氣之為盛衰方可著手病重者正氣必敗邪氣不甚盛宜輕劑用重劑必敗初病者邪氣甚盛正氣未大傷宜重劑用輕劑必敗內本寒外感熱宜先清涼而後溫散內本熱外感寒反前法可也用藥宜開竅使病從汗走或從涕出或從二陰下可相機為之若服牛黃而腹鼓如盆服乾薑而囊縮無形皆未開所行之路也附桂朴為熱藥宣行之上品川軍杷葉薄荷為涼藥宣行之上品至巴豆皮硝厥性暴烈非奇方不可輕用此大較也涕之關係輕重不同傷風乃肺為寒蕩而不甚故涕邪有出路不治可痊也若夫肺將絶而涕魄不藏而汗脾寒而作泄腎虛而遺溺皆為病所致是在觀其情狀而或宣或澀以療之病之宜宣宜澀邪在宜宣宣者行也在表汗之在裡下之若邪未去而正已衰法宜宣澀兼施以扶正而抑邪症之寒熱寒症溫之熱症清之此定法也惟寒極似熱者不問其熱但治其寒也可熱極似寒者不問其寒但治其熱也可溫病痧疹夜發燒而晝不發燒之故研究此理須知痧疹系何物所變方知發燒與不發燒之所以然蓋痧系毒入氣分所變疹系毒入血分所變二者無汗均不能出故汗為痧疹所需要也汗系水穀所化汗出則血液傷血屬陰血液傷於供痧疹需要之時則陰傷矣陰傷則陰虛夜間屬陰於陰盛陽衰之時而陽乘陰虛以用事故熱白晝屬陽於陰衰陽盛之時而陽用事正其令也故平此發燒與不發燒之理由也發燒有陰陽虛實之不同勞病午後發燒為陰虛陽盛午前發燒為陽虛陰盛同一發燒何以有陰陽虛實之不同蓋病者身寒為有餘身熱為不足此無早晚無春秋之通例也但午後為陰故陰盛陽衰則平若陰不能代陽而陽自為用則午後發燒午前為陽故陽稍盛陰稍衰則平若陽不能代陰而陽外走則午前發燒論痧疹痧疹病以汗為順表之似為正法何以今日表之則陷里下之或飲冰水則汗出也蓋表之而溫散以發汗則邪火內熾津液以傷汗源既竭五內如焚所以陷里而變症蜂起也若下之則熱由便泄陰液自復裡氣通而表氣和也或飲以冰水濟其焚而救其陰則熱去陰復汗源乃充故汗自易出也舌脫殼痧出而人反死舌藍邪入厥陰也白痧肺為病也舌藍而脫殼木剋土脾將敗也痧由白而紅火爍金肺將絶也溫病痧疹有時不思涼反思熱熱氣團結而未走故似寒然非大熱不能團結即大熱似寒之理也當於唇焦便赤辨之此症又名代陰代陽是寒症代陰是熱症戴陽目紅面赤唇紅而潤不渴氣粗而不蒸便白非重用附子肉桂不可論濕熱濕熱之症生於脾走大腸為痢走小腸為淋走子宮為帶走皮膚為腫為泡病情以此四種為多治法君藥以黃連黃苓燥濕而清熱走大腸者佐地榆走小腸者佐瞿麥走子宮者佐白芍走皮膚者佐蟬衣荊芥地膚子大致如是再氣虛者加白朮為使血虛者加黃耆為使用法既不可自作聰明又不可膠執成法他如走於腎而腿腫深入脾而為疸等症治法亦甚多如能認症變法自然目無全牛肝氣病之治法肝氣之為病皆由急怒而得其始也治之甚易涼肝即已何者肝為陰中陽而能生火急氣之來肝液暴發而不藏血則疾作而熱生其因肝氣成痼疾者皆為溫肝藥所誤也必也肝為寒侵或寒水為疾母伐其子方能適用溫肝藥木剋土病之治法肝氣每於食後病胃者木剋土也此疾立方其標為胃當以小枳實清胃為君其本在肝當以膽草涼肝為臣作嘔必有瘀血當以桃仁泥為佐木土為疾肺必不宣大腸亦必有滯當以軍炭為使開下行之路再以川朴佐君而行胃滯以石斛佐臣而鎮肝以白茅根佐佐而生新以通草佐使而使清濁異路此配方之梗概也肝病為本胃病為標似應以涼肝之藥為君乃以清胃之藥為君者治病宜先治標也標之為病既甚不清其標難治其本惟治本時不必顧標治標時必兼顧本不顧本而徒治標標無日見輕蓋標本關係綦切必俟標痊而始治本此為必無之事但病既有標本不先稍理其標則正氣易敗耳停食作燒之治法此不分標本之病也宜以生軍為君而降滯以薄荷為臣而退燒以枳殼為佐而清胃以木通為使而逐水並分生軍之勞而使生軍專利於降滯某君謂食留胃脘停而未消似先以消化為是用楂炭穀芽膍胵之屬為宜倘積已下趨非降不下然後用軍為妥云云是說亦有見地但本草皆以軍為霸品而因不敢用軍致病人失下而死者不知凡幾吾用藥幾於無方無軍從未有傷脾胃者此層與某君用法稍有不同內有熱外為寒搏忌用白虎湯此症必腹痛作燒先宜用清涼活血之法如燒退痛減小便赤可不用熱藥如燒退而痛不減唇不甚焦便清可用溫藥逐寒如痛稍減心不煩唇不焦便仍清可再與之如一劑痛大減而心煩唇焦思涼則不可再與仍宜用清涼活血法而稍佐溫平及小便赤陽已大回可重用清涼切不可佐溫平寒者亦如之一發之失生死立判心不可不細膽不可不大但非慧心人不易領會內有寒外為熱搏先用清涼之理此症如用溫散法反將外熱蕩起寒因熱搏熱愈蕩寒愈不得外宣矣故宜先清熱熱去寒宣方可施法此症醫得其法斷無加重之理有如凍柿以溫水浸之頃刻即化以新沸澆之外皮雖溫內凍愈堅緣四周過熱不特寒不易宣反為熱迫而內結矣是時浸以涼水待冰凌外宣再沃以熱水則渙然冰釋物理可借證也今日外科症多由濕毒熱結所致然往往用大涼則陷里用溫補則易已其故安在大陰症豈溫補所能奏效蓋外科除大陽宜涼大陰宜熱外余多得之於肝脾或由悶郁或由厚味使熱毒聚於一處然後入腑則甚入臟則死故於症之初起先降毒後護心又因熱聚一處血液不為氣行則血必寒寒必腐故次宜生新補氣外症為熱毒所聚其腐也何以反由血寒蓋熱則血行而內消必不腐矣其腐也因患處雖熱他處在在梗塞則熱為寒搏而不通故腐而生膿膿則熱隨血行他處亦溫不膿則熱入於內患處亦寒所以膿者易療不膿難已至於治法欲其膿則補之欲其消有可消之希望時則大涼大降可也逮膿去後病雖愈氣必傷故外症以能食為順雖參耆並用而君藥之二花卻不可少二花即銀花婦科胎前産後之用藥近治甲乙兩婦症一則胎前用苦寒産後亦用苦寒一則胎前用大涼産後用溫行所以異者蓋産後用藥一視胎前而定苦寒品為普通産後所大忌貿然投之敗象立見甲婦小産原系濕熱裹胎幾不能認其有胎周氣血皆為濕熱所傷其病在母不在子乃子為母傷之症故始終用苦寒也乙婦乃胎熱爍血之症其病在子不在母故母反為涼血所傷以致血行不暢痛連腰脊且胎前為母子俱不能保之險症血分因虛而瘀故治法先涼而後溫再乙婦症極難治即俗稱抱子勞在守成法者不知害人多少依症胎前寡食由受孕至臨盆無一日安適産後先寒乃陰未大傷陽亦尚固惟血為胎前涼藥之餘毒耳回陽即可止病若産後仍熱則是陰分大傷陽氣外竄施以大救陰之法不過十活六七蓋産後寒易治熱難為也論抱子勞孕婦無勞症倘將入勞則不成胎理最明顯醫者不察以寒能凝血能下胎遇胎熱症不敢投涼劑以致多亡因是美其名曰抱子勞症之初來先嗽後喘脈弦數而搏指醫者認為血虛投以歸耆不應又疑為肺寒投以麻蘇胎熱之人受此熱劑未有不母子俱亡者間有醫者或見及此雖用涼藥亦必佐以歸芎仍不敢投重劑杯水車薪胡能有濟故有一二特出者敢以重劑相投乃病者見而卻走親友聞之咋舌即有服藥見愈者或作醫案以傳世後人不但不信反曰著者欺人吾從前遇此症甚多竟無一人按法服藥以致未曾救活一人良可慨也醫生臨症遇症如遇敵用藥如用兵膽宜大心宜小識宜明行宜慎君臣佐使絲毫不可亂量數輕重分釐不可差常見醫者用成版湯頭藥品不敢易一字而分量反意為增減一劑不效則改方針二劑不效則曰變症或囑另延他醫噫涼熱雜投藥誤病劇雖有良醫弗可為也已婦女崩漏有寒熱虛實之不同寒症則少腹作痛而不脹唇白口思熱舌滑而潤熱症則因熱蕩血腹脹而痛或不痛面赤唇焦舌膩口渴實症則氣促多熱虛症則氣短多寒蓋黑色成塊多熱色黑亦有寒者但視其他現象以定之色不正而黏多寒實則塊多虛則稀而少塊總之此症或黑紫或淡紅或無紅色者見證不一也再寒能凝血而患崩漏者女子天癸按月而來因寒將血閉月留一點纍月所積一旦俱下則為崩漏治法以艾桂逐瘀解拍花迷藥法通關散能解拍花迷藥常佩避瘟散或上等香面香水等及麝香乳香沉香木香檀香雄黃白芷荊芥皂角刺蘭花子等藥均可要之使鼻不得聞他味且鼻竅常開而不閉則迷藥無法可施耳腫治法用田螺加冰片浸出水敷之即愈蓋田螺性寒其色青黑故涼肝滋陰耳腫於肝熱以田螺去肝熱之結毒加以辛溫之冰片而散其瘀則腫自消苦膽與牛黃之異性苦膽能清心火下燥糞其功與大黃石膏等牛黃氣香味苦色黃能固脾胃其性和緩論全生集全生集是極好之書法多可取蓋成方往往無規模且多蠻補之方是集湯頭頗少斯弊用藥補散品為正涼泄品為奇大熱品為偏我同人用補用涼用熱能指揮如意則外科之能事畢矣評王維德著外科證治全生集慈濟醫話癸亥秋季醫者責在救人醫者臨症惟恐認症或左認症不明萬不可冒昧貪功而誤生命認症既明又不可敷衍了事而失良機如症不中變總須盡力而為期收圓滿效果惟有三不治敗象現不治真臟脈現不治病家二三其意不治以徒勞無益也吾從不敢以醫自炫只以近來湯頭醫生與日俱增病人因藥而死者亦與醫俱增長此以往人命不知枉死若干坐視不忍乃作根本改革之圖此組織醫學會之起原也本會研究醫學直接因為造就醫生間接實為保全民命責任重大程途遙遠願與諸子共勉之醫道浸衰之原醫道與營業迥異營業取專利醫道貴廣傳也自來醫道浸衰誤於祕本祕本之起源有二一則偶得效驗之方視為至寶祕不示人一則稍通文墨者閉門杜撰僥幸一得遂誇大其詞録為抄本吝不付梓即有謬誤不肯就正高明噫談醫之人盈千纍萬而得理之人不過十數遑論乎道彼祕密不傳或謬種相傳者則比比然也自誤誤人甚至誤天下誤後世可勝慨哉吾講書論醫舍群家屏祕本專取本內二經示之準繩庶幾積習少挽論內經之主要內經為養生之書首篇即論持滿御神以全天真又曰虛邪賊風避之有時次篇即論四氣調神以養臟腑之數端者可括全經之主要蓋凡百病狀皆緣不知持滿御神不知避虛邪賊風不知四氣調神所致凡百治法皆須審查不知持滿御神不知避虛邪賊風不知四氣調神之故而施以相當之方術也處方宜洞明醫理論脈論病論藥皆易獨配方則難不知醫理則不能配方不能配方萬不可讀湯頭蓋配方以專治某病尚易因病而隨證配方甚難必具有因病配方之能力然後始可讀湯頭藉資參考設不能因病配方據讀湯頭以古方加減為法則勢必不肯潛心深造流入粗工也治病不宜膠執成法治病須法由我定若膠執成法欲適合今病何異削足適履如春忌疏散而喜涼下設病真傷寒豈可下乎秋喜疏散而忌涼下設遇內熱症豈可散乎立方以治病為的不厭重復如百人同病瘟則同用一方而視病之輕重體之強弱略豫增減之雖治百人可也如陰陽交爭病雖在於一人而今日陽盛則助陰明日陽敗則又須助陽隨病更方並非矛盾雖一人而兼用數方亦可也醫者不察往往得一方以為奇珍無論何症皆用一方誤矣矯其弊者又或自詡飽學不問病之何屬但易人即易方此人病瘟而用涼彼人病瘟而用熱矜奇立異皆不明理之工也治病不宜專決於脈治病之法先察色音後察二便詢其所苦問其所欲然後取決於脈則十得八九矣若自作聰明僅以脈斷未有不貽誤者緣病之所生多由於風風脈未有不浮者如吐而頭痛項強便難脈浮則宜降不吐而頭痛項強便利脈浮則宜散同一浮象而輕入則散深入則降緣頭痛則太陽病吐則太陽陽明俱病仲景著作誠大觀也治病貴得病家信心某君之疾為最難最險之症緣肝熱氣虛濕盛為本感熱為熱感寒為寒故首宜生血次宜固氣寒盛宜治寒熱盛宜治熱此難於施法之症也醫者認症不清則不敢治認症清而病家不信亦不能治故斯疾微吾不能治微某君不能愈施者受者彼此均有關係諸子遇斯症務先與病家說明症變之理倘病家相信得完全施以相當方法庶可多救幾人用藥瀉多於補之理治病如修理時表表之待修以積有油垢耳人非水穀不生活飲食入腸胃積日既久則所食之厚味及難消之食物逐漸積滯於腸胃一受外邪因而致病故治病之法除虛寒內傷另論外其它各病無不須清胃而去滯者則修表滌垢之類也若虛寒則如表內機件之不固內傷則如表內機件之損壞此二種病在表非僅滌垢可以竣事在人亦非僅降滯可以獲痊也水穀精微經行臟腑之次序臟腑資水穀而生養水穀因臟腑而變化水穀之於臟腑其關係誠密切也而水穀之精微經行各臟腑其曲折奧衍實有一定不易之次序焉蓋胃為受納水穀之所飲食入口先至於胃經脾與膽汁消化之其所化之精微由胃之管而下入膀胱著於膜即化為水液體此水經腎陽之蒸膀胱之化清者上升由三焦入肺而為氣氣體濁者下降則由溺道行矣胃中所餘之渣滓注入小腸經一度之變化輸入大腸再變化其形體而為糟粕固體則從魄門出矣再飲食入胃除前言精微入膀胱糟粕走魄門外其極精微者由胃化精為血而入腎血為陰復入其所生之臟以養五臟之真氣於是由腎而肝而心而脾而肺流轉而不息焉其入肺所化之氣為陽復入其所克之臟以運穀氣之精微於是由肺而肝而脾而腎而心循行而不已焉氣血在人身中往來運行如環無端周而復始而水穀之變化臟腑之生養於是相生相剋而相成矣誤藥之敗象及死期熱病輕者或飲涼水而愈或並不服藥而愈以邪在皮膚邪去則病已故勿藥有喜若誤服熱藥反增劇矣熱病誤服熱藥當現口渴神昏譫語唇焦或全身雍腫之象寒病誤服涼藥當現面青唇白下泄腹痛或氣短胃寒盜汗之象此大略也尚有敗象種種未可執一而論病勢雖輕若誤服藥雖屬平妥之劑速則一月遲則半年必死蓋人身氣血之消長視月之朔晦為轉移至一月則氣血隨月之遞虧漸漸被藥消盡生命乃亡若氣血盛者一月傷太陽二月傷陽明三月傷少陽四月傷太陰五月傷少陰六月傷至厥陰而死又死期一月半年之分亦關傷胃傷臟之異傷胃則胃氣漸絶一月必死如熱病敗象為神昏譫語寒病敗象為作泄乾嘔皆反藥攻入陽明之象然要知非由太陽傳入緣胃本熱或寒繼以反藥來攻變本加厲胃乃於裂或收縮致不克收納水穀分布臟腑其人不亡何待故斷以一月死也傷臟則臟氣將敗半年必死如熱病之壅腫寒病之胃寒皆由少陽攻入太陰之象蓋熱病至唇焦畏寒口渴便燥知病在太陽及全身壅腫則入太陰矣寒病至頭痛項強唇不焦便利知病在太陽及胃寒氣短則亦入太陰矣由一月太陽起至遲不過傳至六月厥陰而亡其間無論在何經期內一現神昏譫語或乾嘔作泄之敗象未有不立即身死者誤藥之後如氣血未至大傷亦可救藥緣此病既非內傷又非邪客不過為藥毒影響所致故氣血苟未過傷尚非不治之症傷寒論傳經以日計內經之傳經或以日計或以月計或以年計者蓋邪多以日計失調多以月計內傷多以年計也前言誤藥不即死而可救治者指身壯害輕者言非普通也醫者以術救人用藥辨症萬不可不周詳審慎設因輕心武斷誤投劑以殺人在醫者不知在病者亦不知醫者誤斷曰絶症病家亦誤信曰絶症殺人於不知不覺之中雖無法律相繩奈陰騭何言念及此心滋痛矣可不慎諸某兒始患瘟熱瀉痢用誤服參術及西藥近現唇焦齒枯音閉大便黑紅皮肉粗厚等象乃邪灼太陰之證法宜養陰涼脾舒肺降滯活血疏邪以治之若全身腫潰音閉便結死無日矣陰陽之開闔樞讀書固不能任意翻案亦不可泥古鮮通內經各家注以王注為最正確吾講內經亦不過推廣各注酌量取捨而已內經以厥陰為闔他若甲乙經中藏經亦皆以厥陰為闔吾意總以少陰為闔而厥陰為樞何者足太陽在足少陽陽明之下陽當上升膀胱開其上升之路故為開至胃而藏散布各處故為闔膽居胃與膀胱之間為輸送陽氣上升之樞紐故為樞也又足太陰在足少陰厥陰之上陰當下降脾開其下降之路故為開至腎而藏散布各處故為闔肝居腎與脾之間為疏泄陰氣下降之樞紐故為樞也證之傷寒論一曰太陽二曰陽明三曰少陽四曰太陰五曰少陰六曰厥陰亦似以開闔樞為傳送之次序敢貢一得以資折衷但各家注厥陰為闔之理實為精確不磨故義可並存又不可強分軒輊也營榮衛血中所含之氣為營陽也血為榮陰也其行於營榮之外之氣而為營榮之衛護者曰衛衛即出毛孔之氣西醫所謂用數千百倍顯微鏡照見毛形如樹其下有坑坑內有許多蟲或入或出即衛氣也內經論之綦詳今人能分營衛者有幾營榮衛及胃氣為全部內經重要之點學者宜剖別清晰衛氣賴營榮以養之營榮賴胃氣以養之養生之道在此療疾之道亦在此如以衛為營則營字可廢以營為衛則衛字可廢吾不憚反復引伸者恐有遺誤耳自誤罪小誤人罪大風傷衛寒傷營衛在外風能傷之營在內必須寒侵內而後能傷營傷則血凝故經云熱傷氣寒傷形其實熱亦能傷形寒亦能傷氣不過熱重方能傷血熱輕則否寒則傷氣三分傷血七分肝肺部位中西論各不同究應何從肝肺之說有四或曰肺右肝左或曰肝右肺左或曰肺居心上肝居心下或又曰肝系在左部位在右肺系在右部位在左之四說者雖各有見實未中肯吾謂欲求肝肺之左右須知膂脈系左降而右升肺之呼吸之喉在右蓋肺主呼肝主吸肺雖在上其系實居脊右肝雖在下其系實居脊左內經既曰肝左肺右膂脈又右升左降難經又曰吸為肝腎呼為心肺氣管又為右喉以上諸據足證肝系確在脊左肺系確在脊右心主呼故為表其系從肺亦必在右腎主吸故為里其系從肝亦必在左脈何以能動何以因其動而能測表裡虛實脈為血之府氣率血行故能動肺運五臟之氣行至寸口而止邪客於氣則浮故在表邪客乾血則沉故主裡氣血俱盛則急為數故曰實氣血俱竭則緩為遲故曰虛此論脈之緩急謂其至數非謂其來去也經絡脈之別人身之筋束骨絡肉形則中空經絡即就筋而定名十二經氣血所行之筋為徑由經分布之筋為絡由絡分布之筋為孫絡徑與絡與孫絡之內有孔孔有薄皮之管內通於心心血因氣輸送於管分布於各經及絡及孫絡以榮筋肉其行於經內氣血之動者為脈重按之而覺酸者為穴緣脈遇筋之薄處或氣血盛處則應指而動因其內通於臟故能切人之表裡虛實再筋之根發於肝而系通於心真血行於筋內常血走於筋外試以寸關尺言其鼓蕩之力皆在筋內常血亦由筋分布於外以榮內筋薄處是否即穴凡有動脈處皆為脈而穴之所在則不限於筋薄處也例如寸口尺澤太陽虛里等穴則皆筋薄而脈可按小海等穴則筋厚而脈不可按論嗽立方當問病因然四時司天之權亦非絶對無關係如春嗽冬日腠理闔閉邪風不易內侵其嗽也多由煤炭之薰蒸所致故宜養肺但終日僕僕風塵由風寒作嗽者不在此例如秋嗽夏日腠理開張最易感受風邪故宜清肺但由內熱作嗽者不在比例又陰虛皆作嗽當問其有無口渴便燥舌膩等象而分之口渴之種類及原因與治法胃熱口渴為本病由他種原因所傳因之口渴者更約有五種因腑熱灼胃而作渴一也因臟熱灼胃而作渴二也因血虛灼津液胃失津養而作渴三也因血淤胞門致津液不得上行潤胃而作渴四也因水停膈間不能化津液潤胃而作渴五也諸渴之治法皆宜先養陰生津以潤胃再視其發於何種以定佐使胃寒而嘔脾虛而泄與霍亂之熱證吐泄其區別安在胃受寒則血瘀氣滯少受盛之能力故食入胃則逆而嘔脾虛而失運化之能力故食不化則泄霍亂乃寒熱相爭之證寒勝者氣血俱凝故不得吐泄熱勝者氣血俱張故上則吐下則泄因受病之情形不同外形自不能無異也論霍亂症霍亂乃陰陽相爭之症陰盛為寒陽盛為熱故霍香正氣為治寒熱未分勝負之正方取其香竄分解寒熱使邪外走也如勝負已分非理中自虎湯不可理中治陰盛白虎治陽盛知滑潤與否為最大之關鍵然脈象外形亦不可不察因熱極亦有舌滑而潤者但甚少耳又已吐泄者多熱欲吐泄而不能者多寒為霍亂之公例論便紅症便紅症脈皆洪大醫者多以為浮緊妄下附子升麻不知便紅除虛弱已極外皆因過於飽食大絡橫解以致絡血妄行腸結為熱非重用白茅根不足收效論虛弱便紅症虛弱便紅乃氣不固血所致可用升麻附子其脈浮而無力大而不實與熱症脈象外形迥乎不同傷寒有熱入血室白晝清明夜則譫妄如見鬼狀顯系熱邪古方何以反用柴胡湯加牡丹皮治之此須視病人情形如何熱甚用白虎湯亦可佐麝香亦可但用柴胡亦自有理緣血滿心包故用丹皮涼下柴胡平升一升一降血自有出入之路而症可已也喉症治法喉症甚多寒者可溫散用半夏陳皮熱者用黃苓牛蒡子實者用桔梗前胡惟虛者最難其症多白喉可大養陰大降重用生地元參犀角羚羊均可用至紫雪安宮牛黃丸勢在必去因該兩藥內多開竅及忌品用之收功甚緩症勢急不待緩必致於亡病人聞有人耳語之故有李某者每聞有人耳語囑以早歸不可遲滯人世不久即病亡蓋人肝虛則魂離心虛則神離神魂俱離則神魂自能為言而本竅應之故有是狀人有久病瀕死能知遠方之事或見鬼見神者皆是此理用針用藥用針用藥俱是一法須先知陰陽臟腑之職能經絡血脈之所主方能用針用藥若學針僅知刺學藥僅知湯頭則不足談醫矣梅花刺與陰刺陽刺陰刺陽刺均與梅花刺法無關梅花刺不過刺之一法直入一旁刺四為梅花刺又旁穴刺者因正穴禁針則於正穴之旁刺之是為陰刺若正穴不禁針則於正穴刺之是為陽刺有謂直入一旁刺四或斜刺為陰刺者則大誤也此為針法最重要之點前講熱走小腸為淋今講熱留小腸為閉而不通前後不同何故熱為氣化由小腸入大腸因為氣結故未經大腸即由三焦脈系入膀胱而為淋症若熱與血結則專走大腸而便燥矣慈濟醫話癸亥冬季醫貴明理道以理明醫亦以理明藥以氣味為本形質為未人以氣血為本經絡為末欲知藥之形質之機能須明藥之氣味欲知人之經絡之機能須明人之氣血此為格物之至理溯本求原為科學之初步論治病之難治病一道言之易而行之難撮而言之其難有五人之病也醫者能知而病者疑其難一病者信而醫者不知其難二奇病怪疾不載於書其難三醫有發明之心得公布於衆而衆不信其難四醫生能知病者亦信而不善於調養其難五治病用法之步趨治病用法當以本內二經為主體以傷寒金匱為參考始協正軌若專崇一家或僅貫串數家未有不偏者也他家僅可為佐證耳取法乎上僅得乎中況取法於下而又下者乎學者用法當步趨正軌以行神而明之自無難症若泥守他家一遇未經論及之症則束手無策矣後世之醫往往心無見地僅持二三湯頭出而問世乃執方而覓病非對症而立方也無所謂難症不難症遑論乎步趨如肯博採群書有暇並對於本內二經時加尋繹即步趨也藉曰內經難解本經藥少則無步趨矣論中西醫西醫每謂中醫不精外科中醫又謂西醫不精內科皆自棄之語中醫果精何曾不善治外科西醫果精又何曾不善治內科法分中西理實一貫必強分界限以定瑕瑜豈非執一之見乎論中西醫世人近為生計所迫業中醫者日多道理不明脈臟不達所在皆是無怪西醫曬之但西醫未諳中醫之理每謂中醫不知臟腑之部位及作用豈知內經靈蘭祕典論部位及作用較西醫尤細中醫又謂西醫輕視人命不知內科尤為可笑蓋西醫經數千年之研究若無真實學識其道何能行於我國中醫著作歷數千年之久成於諸聖之苦心若無真實道理亦豈能傳至今日乃西醫日見進益中醫日見衰微人命存亡爭此一線何忍坐視現在講解醫書願與有志之士重興我道聽講諸子對於中醫復興責任綦重好自為之可也茲將所講書目另行編訂如下一素問二靈樞三本草經四脈經五難經六藥性賦七甲乙經八中藏經九傷寒論十金匱要略內經成於何代作於何人當就文字推定內經中九州及閹者等句皆二帝三王以後之歷史足證非黃帝時書可斷言也但有謂系秦漢方士所作者引例固詳亦難盡言試就經文以定時代實兼三時代之文字而有之其文體之古奧也言簡意該與左傳四子相伯仲是可斷為列國時文其文詞之偶涉誇張也與古奧句法判然不同逼肖秦漢時人之口吻是可斷為秦漢時文其篇名所定與中藏經筆調相同詞采所流與三國文作法無異是又可斷為三國時文在三時代之醫聖列國則有和緩秦漢則有仲景三國則有華他全經文字岐異筆墨非出一手故觀於文字之深老知著作者為和緩觀於語意之鋪張知潤色者為仲景觀於標題遣詞之工雅知成書者為華他注解醫書以內經為最難古今醫書夥矣或以易禮二經而講醫或以子集而講醫等而下之或論方或論藥或論形骸議論紛如彼此聚訟是非不免互見矣若嚴格取之求其醫理精確不磨者厥惟本內難三經尤以內經為精深而難解後世學者或法長沙或學河間次之或取景嶽或宗洄溪或讀修園鮮不為一家言所束縛即有一二志趣遠大者亦不過專攻本經或究心難經緣前人於本難二經不無精確之注解也惟內經一書注者雖近百家大半依樣葫蘆陳陳相因絶少獨抒心得能發前人所未發者吾輩何人敢持高議但於仔肩所寄不敢不勉擬於內經從事注解竭千慮一得之愚避影響模糊之誚俾數千年發揮未盡之學理或放一線光明焉道無終祕願與同志共勉之注解內經宜博於參考吾講內經並不甚精因於易禮二經不過略知大概耳大凡講書材料首在串文及取捨各家注吾輩欲精注內經亦宜先串文次看各家注再細究易禮之奧再旁參老子關尹子抱朴子孫子諸著作然後下筆注內經自較以甲乙經注內經之啓玄子為佳吾不過為識途老馬若拘執吾之所講亦非正確蓋七七八八之數不以易講不透宮商角徵羽之音發於喉舌唇齒鼻與臟之關聯不以禮講不透此吾所短希諸子有以濟吾注解內經宜求真是著書一節不可謂古人遺法不敢輕易一字亦不可藐視古人不加思索隨意竄改自來注內經各家王病在不改李病在擅改高吳二家雖較善然亦犯王李之病即我所講我見為是未必人以為是即人以為是亦不過暫定為是設有人將我之理駁倒另有較長之理則彼是而我非又有人將彼之理駁倒更有較長之理則彼非而此人是矣論新內經前有人以新內經送閲考其內容不過翻譯西書亂駁古籍將中國數千年古聖先賢概以方士二字一筆抹煞多見其不知量而已改脾為厥陰心包為太陰之主張脾為厥陰及厥陰為樞此吾個人之主張也厥陰為樞之理前曾論及茲再述脾為厥陰之理古說脾肺屬太陰心腎屬少陰肝與心包屬厥陰究之土生金太陰之脾肺二者乃相生也水剋火少陰之心腎二者乃相剋也至厥陰之肝與心包生克皆所不居二者乃不相干也各陰配合之關係參伍錯綜似無定例可循何如以肝脾屬厥陰則為木剋土以肺及心包屬太陰則為相火剋金再加以少陰心腎之水剋火是手足三陰皆取義於相剋而相成其說較為整齊劃一乎惟是內經三陰由陰陽互助之理而成鐵案天然無法可以駁倒吾之杜撰雖有具體之理由姑存一說可也間臟與不間臟五臟有病母子相傳為間臟即間其所勝之臟而傳於所生之臟也五臟次序肝傳脾而心間之心傳肺而脾間之脾傳腎而肺間之肺傳肝而腎間之腎傳心而肝間之例如肝病脾則肝所勝之臟心則肝所生之臟也肝因為心所間不傳於脾而傳於心是為間臟其氣相生雖病亦輕而易愈若肝不為心所間而傳於所勝之脾以木剋土是為不間臟其氣相殘有病必甚而難治心之部位與脈氣難經云呼出心肺心主呼其系從肺因肺在左心亦必在右乃就部位言也內經脈要精微論云左外以候心是言寸左以候心乃就脈氣言也兩說各有所指似相左而實相成心包脈之部位心包上通於目下達於腎既通腎定在右尺也左為脈之起處腎居下為天一生水故居左尺水生木故肝居左關木生火故心居左寸火生相火故心包居右尺相火生土故脾居右關土生金故肺居右寸就五行言心包亦應在右尺也惟內經脈要精微論云內以候膻中膻中為心包別名所謂候膻中為左寸者乃火將生相火之象由左寸生右尺非謂心包之脈在左寸也腎志恐腎主藏其脈下達於足及睪丸上通心包由肝至目而止於手惟其主藏而通目故目觸怪象而搖其藏此恐之所由生也論三焦論三焦非繪圖不易瞭解茲繪縱斷面圖如下四線皆池膜統名三焦兩直線即等於圓形中空之油膜此膜外貼筋骨通腠理內連臟腑兩橫線為兩圓形薄片之油膜即膈膜也上層油膜居心肺之下下層油膜居肝之下腎之上上線之上為上脘兩旁直線為上焦上線之下為中脘兩旁直線為中焦下線之下為下脘兩旁直線為下焦三焦小孔甚多便於輸運具輸送水分運化精微之功能間有大孔十數以絡臟腑之孔為往來相通之引線總之三焦形如竹筒中隔二節不過為玲瓏體耳論胃氣或問胃氣有無之關係曰凡病重嘔逆或脈澀而現真脈者其結果必死蓋人賴水穀以生胃為水穀之海更賴脾之液肺之氣以化五穀也若胃因病耗而蒸乾則脾液必不能達肺氣亦難輸送嘔逆繼作不能消化水穀分布各臟矣夫氣率血行肺因胃干而失能力則氣敗不能率血故脈澀論脈之潤澀或問人謂脈有餘則生不足則死其信然乎曰然滑潤之脈即有餘枯澀之脈即不足如雀啄屋漏等脈皆枯澀而失滑潤者故弦脈必如尋長竿歷貫珠方為平脈極形容脈之滑潤也脈分五色之故及觀脈色之法心生血血色赤肝藏血血不甚流則青脾統血因流急而色淡故黃入肺尤淡遂化為津故白腎受血而不流故黑總之血液本色屬赤生色黃因血流也死色黑因血滯也色潤則流色暗則滯此五臟分五色之故也至脈分五色亦同此理皆血之多少或流滯之關係而已脈為血府真血行於筋內血少當現白色即淡紅色因尚流通也若不現白色反現青色者因血少筋空寒乘虛而入血為寒凝故青此為脫血脈平為紅色血多為紫色血多而又為熱結為黑色隔膚觀脈其色殊難指實緣青白紅黑紫皆有青色乃肉膚色也凡觀脈色當由青內求青白紅黑紫言之易而觀之難只可以詞藻形容之如青而華潤者為平華而青色淡者為白華而青色深者為紫華潤俱失筋暴而青者為青甚於青者為黑論運氣運氣之說不一內經謂由正二月起每兩個月為一運難經則以冬至後第一甲子起運世補齊又以立春日起運彼此不同何也曰皆是也學者研究運氣當先知運氣二字作何解釋運者五運木火金水土也氣者六氣風暑燥濕寒熱也簡言之即陰陽也推言之五臟為陰以應運六腑為陽以應氣人身之陰陽莫非天地之運氣也是以就五臟言則以立春說為是就六腑言則以冬至說為是若推而廣之就宇宙之紛紜萬象言尤當以干支說為正此內經所載所以包括一切而靡遺也五行相生之中亦能相剋五行相生相剋各有定序然相生之中亦有相剋之理存焉何者木因火培而生火因鑽木而生土因火煉而生金因土産而生水因金化而生此五行相生之概也木見金而立斷土見木而立分水見土而立干火見水而立熄金見火而立化此五行相剋之概也伊古以來人之宮室衣服飲食器皿諸項無不本於天然生克之力以運用而不窮但細推之相生之中亦能相剋藉收相制相成之功如木能生火然以柴遇火而木成灰火能生土然以土滅火而火即熄土能生金然以金為鏟而土自分金能生水然以金置水而金立炸水能生木然以木滲水而水自干是以五行雖妙運用在人不可執一而論如經典所謂子奪母母奪子未嘗非是理也然此理雖圓作為疑案則可若著為正解恐鈍根人反無軌道可循故此理吾初不欲言又不能終於不言讀者會通其意可也論人之強弱人之強弱不在身體之胖瘦而在精神之盛衰精神活潑是瘦亦強精神頽喪雖胖亦弱故斷人壯弱不能以肌膚肥瘠論論婦科醫者於婦科之症動渭難於男科此論吾殊不解治病之要但觀人之稟賦何如病症何如以判難易無老少男婦一也婦人隱疾不過陰挺陰癢帶濁等症而已余若經事胎産諸症雖變幻百端若以標論固莫知病所由來試推其本仍不過臟腑虛實氣血寒熱之分有以致之耳論幼科幼科只要分清寒熱虛實便無死於藥者醫者動謂幼科為難吾疑其未明望聞問切之理耳論病傳之分類內經所論之傳病有順傳有逆傳有不順不逆之傳標本病傳篇之病忽表忽里忽順忽逆是也有表裡相傳者有父子相傳者或以日計或以月計或以季計或以年計其不同者因病而各異故內經分篇一篇是一篇之病篇篇絶不相同每篇之標題最關重要也所謂以季以年計者內傷症急則以季計如勞病是緩則以年計如雜勞偏枯肝氣瘋癰等類是偏枯不過十二年瘋癰不過六十年風濕之理欲求風濕之理先求熱濕之理水因熱蒸能外達汗則無濕矣其釀為濕者因氣蘊結過深不能外達則為濕熱是時寒邪深客化熱為寒則為濕寒汗欲出時遇風蕩而化汗為濕蘊於皮膚則為風濕是以寒濕熱濕在裡風濕在表例如壁前置火爐上置釜而盛水水因熱蒸化氣升騰以蓋覆之蓋必濕此熱濕之理置濕蓋於嚴寒處蓋必凍此寒濕之理設無蓋而有風氣因風蕩侵及於壁壁必濕此風濕之理隱軫之解釋心中鬱結不舒曰隱軫其病在內景嶽以較為疹其議論雖若貫珠但根本誤解故後世治疹者遵用其法十不過活一二耳學者用功當思仲景何以為仲景蓋學仲景則不如仲景果其志在仲景須覓仲景之師而師之讀傷寒論則知仲景為師本內之人吾等取法乎上亦當屏諸家研本內庶可補長沙之不足論受寒治潔之不同今人論醫寒熱分兩派用溫者謂用寒者非用寒者謂用溫者非不知皆偏也人之病感寒則用溫感熱則用寒論固是矣但能明辨者甚鮮大都用下散兩法以為應付散者以病皆受於外故主散下者以病多滯於內故主下二者雖略有見地仍昧於標本耳人之病各有標本例如甲陰虛而受寒其病如滴水於旺火火將愈旺故法宜清熱養陰藥宜甘寒乙胃寒而感寒其病如滴水於冰冰將愈堅故法宜溫胃散寒藥宜辛溫之二人者同時受寒其標雖同其本則異是不能不異其法以治之否則治法從同勢必一生一死此為我道最要最難之點能理會此意天下少難症矣治肝宜分別虛實實宜柴胡虛宜石斛蓋肝為邪克不得疏泄為實柴胡性悍而散故宜柴胡以疏泄之肝陰不足以潤肝則肝虛而失其疏泄能力石斛性平多液故宜石斛以潤之脈色青或黑之治法血既少又為寒所凝則青當用附子理中湯治之附子至少須用一兩血既多又為熱所結則黑當用犀角地黃與大承氣湯加減之論痧疹吾論痧診屢矣名醫對於疹症恆用溫散者大約皆為景嶽所誤景嶽以為氣熱為痧血寒為疹痧宜清解疹宜溫散其理由殆謂血為寒凝流動不利結而成疹非溫散不可不知此症為寒痱與疹判然兩岐疹乃血為熱煎流動不利聚而成疹也故寒痱則身不壯熟面白唇潤舌華脈遲畏寒能食不嗽疹則口渴唇焦心煩脈數嗽而多汗二者種種不同景嶽不知此理誤寒痱為疹粉飾多辭以惑後進噫古今死於此案者不知若干人也羊毛疔治法斯疾由肺熱極而得毛乃肺心所生治法以雞子清和蕎麵搓前心毛即隱現皮膚間可隨搓隨挑黃病治法此症乃脾熱過盛所致黃為脾之本色而五臟之精上注於目故水邪由脾泛溢於五臟濕熱上蒸脾色外現身目俱黃治法宜大涼肝大養陰故犀角羚羊牛黃可以並用膽草可用六錢活蝌蚪活蚯蚓俱可常吃多吃小蚯蚓每日七條病重倍之多亦無妨俾肝陽失上亢之勢乃庸醫對斯症多誤於利脾利脾亦未必即死因熱化熱也惟二十劑後雖無敗象必致良醫失其功良藥失其效果其脈緩雖危尚可救若脈不緩容雖華亦難為矣熱因風閉血為所煎而脈甚靜之治法此疾難治因氣血俱傷治氣則傷血治血則傷氣散陽則陰脫養陰則陽敗也治本之藥品當以黃耆固陽佐以養陰之品甚者可用西洋參龜板至臣使應用之藥隨標加減之發汗品雖助陽攻陰使陰氣汗解而平若陰虛無可攻使汗出則陽氣亦隨之外越此陰不內守陽不外衛之義也故吾杜撰為散陽寒泄之治法寒泄之症乃腎陽虛而寒水勝魄門失職所致治法當分其氣溫其下焦兼固其陰古方對此殊少善法蓋用術則脾雖利而氣滯尤甚脾反受其克惟用木香元胡等藥分其氣則脾自利若用附子則走而不守能敗血用乾薑則守而不走能溫下焦故附子不可用乾薑可用再用生地二冬養陰以佐木香元胡庶得其平凡患泄者不死於理脾即死於熱中陰虛作嗽之治法近日嗽症大發陰虛嗽症大劑養陰清熱可痊若謂病者陰虛或體弱宜參耆一劑嗽略止而胸滿再劑嗽止而失眠三劑嗽復四劑午後燒作勞成形矣今年時令恐轉為勞病者居十之五問答十五則問喉症有幾治法如何曰約分四種紅腫為實白腫為虛喉閉為里喉緊為表實宜清宣虛宜養陰表宜解表里宜大下外以神效異功散錫類散施之異功散於虛症里症尤宜若實里二症甚則非刺不痊問汗如洗之治法曰汗為五臟津液皮毛為肺所主皮密汗藏津液乃四布以資榮養今肺不司職致津液不輸布於內部而外泄於皮毛汗多則亡陽治法不可發散重用黃耆必須過兩並用西洋參當歸女貞子枸杞子等藥或可起死回生以黃耆固中止汗以西洋參補肺氣而澀魄汗以當歸固肝以女貞子枸杞子養心腎而濟水火再用通草郁李仁以開二陰之竅則盡制化能事矣問胃受實邪邪鬱結於經脾病如折治法如何曰此乃為熱症宜輕用附子乾薑肉桂杜仲芍藥治之緣胃脈下髀胃受邪則熱攻入脾而不走胃亦因之而寒故用附子攻熱乾薑理胃桂心引經杜仲治髀問胃因受邪失其運化水穀之職致病食痹治法如何曰宜用木香桃仁大破氣血引用滑石軍炭開其陰竅若用三承氣湯則嘔不下而氣反傷問脾統血脾受邪而血無所統致肺失養而病少氣治法如何曰此為陽虛症可用補中益氣湯問腎虛腰病如折之治法曰用虎骨鹿茸等藥問肝腎不足血液毀傷唾咯不止治法如何曰肝不足者火必盛腎不足者火亦盛火盛則毀傷血液此症首當養陰養陰則腎水足而心火滅心火滅則肝已補矣再佐以活血清胃之品或可救也問善食易飢之治法曰胃熱盛極食入胃即化而行於大便不能運津液養臟腑故善食易飢成消中之症當用大溫補品鹿茸燕窩薏苡仁等類治之此本熱症仍治以熱藥者因胃熱而能化食與胃干消渴者大反食不能化津液則脾虛脾虛則一臟寒虛牽連各臟即壯火食氣之謂因病在胃故須先大補脾土問稀屎勞之治法曰此症系胃受風邪失其運化之職致成飧泄治脾治腎均缺妥涼肝破血或可痊蓋風邪入脾必致木不能剋土而木火反旺若理脾則燥金金傷則不能剋木而木火愈旺若補腎則血液愈凝故均非宜惟涼肝則木乃足以制土破血則血液輸達脾乃足以統血也問脈象沉數細散虛實並至其病為寒熱治法如何曰此陰陽相搏之症治法可羚羊黃耆並用先用耆以固其陽後用涼藥以養其陰此分理陰陽之法也問脈象浮散目搖動而不明頭眩暈而顛仆治法如何曰浮為陰虛散為神不足此陰虛不能濟陽之症也陽無所附則孤陽上越神氣將亡故眩僕治法如西洋參黃耆生地二冬俱可用萬不可用桂附薄荷茵陳等藥蓋涼熱散品均不宜涼熱補品均可用也問脈象細而沉靜而不躁且骨痛治法如何曰沉細為陰脈象細而沉病在陰經也且邪甚入骨故骨痛治法寒脈不躁當大養陰舒筋活血若用散品則更痛矣問脈象數而代下泄及便膿血治法如何曰此陽盛已極血為熱傷脈不接續故六動一止非五臟替代之絶脈也血為熱迫由陽明而下入大腸故下泄及便膿血治法用白虎湯加犀角和桃仁承氣湯劑可速效惟此症十活三四問陽氣不上升或不下降之治法曰陽不下降有用沉香肉桂引火歸源以降陽者陽不上升有用柴胡桔梗以升陽者升降兩種治法尚非甚妥升陽降陽另有一法可通治之緣二疾皆作陽有餘不過一蘊於上一結於下耳陽既有餘陰必不足陰不足則可大養陰陰足則陽平故二症能以一法治之即用枇杷葉二冬紫雪安宮牛黃丸可也問腰脊痛而身有痹之治法曰此乃升陽之氣少不能通經達絡腰脊部失陽氣溫養也氣少不能運血血不通故作痛且周身血脈不通故閉塞而成諸痹治法宜用補陽還五湯論薑母之病薑母病之獲痊非吾之功初病時熱象外陳確為陰虛之症但未及投軍大黃僅下石膏數錢而已泄作又似陽不能固之兆及使診脈又云浮數洪大吾故煩某醫復診據云滑數有力吾則得法矣因吾與姜君是誼屬師生而情同手足始用大養陰大清解法與數相爭衡復因調養得法乃慶更生設無某醫之復診姜君等之調攝吾法無用矣論程君之病程君病象現在兩脈沉細舌乾畏寒思熱吐水腹脹尚未脫險甲醫所主之三甲加西洋參乙醫所主之猛燥於理固是但西洋參不能用以味甘苦而性略緩斂也三甲亦為時尚早吾曾為某君用三甲者因大病已去僅餘嗽耳是時非三甲不能培其元今程君因何思熱畏寒吐水蓋其疾為舍脈從症之症不能論脈也日前既唇焦便赤發狂確為陽狂之症服藥二大劑不效故煩醫往視十一日未見大便確為實滿陽狂之症非用元明粉不可因擬一大劑尚稱順手旋又用二大劑舌乾嘔逆腹脹種種敗氣畢陳今雖不嘔逆必仍舌乾其吐水腹脹乃肺因腸結實熱蒸將枯不能分理水氣之故畏寒思熱亦緣肺為熱結而不得宣吾用大救陰法亦不過強與數爭此為生命關係特詳論之再斯疾至今日臟腑津液皆枯其不死者僅一線之餘陽耳吾法欲假其餘陽以潤臟腑薑母年老是法尚能收效王君病亦賴是法得不死今用是法或能勝數並未可知本年癸亥冬溫之治法今年冬溫宜用甘寒化熱復其津液用生軍蕩邪分陰陽通里氣則疾自愈表藥除蘆根重用薄荷少用及茵陳板藍根外皆不可用雖荊芥亦在禁例生地鮮者可重用生地則不可用預防春瘟或問入冬缺雪恐釀春瘟請立代茶飲方以預防之再感春瘟者初為何狀應服何藥以杜其萌乎曰冬而不行冬令溫疫已露但預防則可若擬染病後之方因人稟賦不同分兩難預定也此病初起時渾身疼痛憎寒憎熱頭暈唇焦無味或咳嗽多涕多淚法宜白虎湯加減治之預防之法室不宜過暖宜少食厚味多食蘿蔔緑豆梨藕等物又代茶飲方開後二花四錢鮮生地六錢霜桑葉四錢寸冬三錢炙杷葉四錢郁李仁三錢甘菊四錢生軍之效用或問中醫謂生軍不但破血且能生新而西醫炮製藥品提煉最精經數百年之研究數千名醫之化驗證明生軍無生新之能力何也曰中醫論藥不但論其質且論其氣論其味論其色生軍一藥其質重且有液質故能破堅因液而能生血其色黃故能清胃其味苦故性寒味厚故下行其氣芳故能破血若僅提出氣芳之質用之破血則可下行則不可若製片用之則能逐瘀生新清胃破結白蓮花其色白其氣芬其味澀專入肺肝降肺之濁升肝之清又因其本中空而生於水其性微寒破瘀功同蓬莪朮性澀功同白芍紅蓮花與之略同惟走心肝白蓮花瀉而不走破而不生枇杷葉性平味淡氣厚質重色青故有理肺疏肝燥濕之功緣色青可疏肝味淡能燥濕質重氣厚有升降肺部清濁之能力三甲與生地元參之別三甲與生地元參同為養陰上品然性質稍異用法亦殊三甲取其咸膩而走生地元參取其脂液清潤三甲因其不守故兼入氣分生地元參因其清潤故專入陰分三甲若佐清涼治溫尚可用至三甲復脈湯治太陽少陰兩感之症則可治溫則殆附録認穴說醫者治病本以救人認病不真誤投方劑反以害人用針利害亦猶是也夫人為陰陽之氣所生不能無病既病矣無論病源由於內傷或外感總之不能離乎瘢身之經絡是以用針之法深淺疾徐虛實補瀉固宜加慎而認穴之重要尤於病人生死有莫大之關係焉試詳言之蓋臟腑有井榮腧經合諸穴皆為經絡之脈所通行臟有五每臟有井榮腧經合之五腧五臟則五五二十五腧腑有六每腑有井榮腧原經合之六腧六腑則六六三十六腧再加心包絡一經則經脈計有十二十二經有十二絡穴又加以督之長強任之尾翳及脾之大包則絡脈計有十五以十二加十五凡有二十七氣以井榮腧原經合之腧而行上行下其始所出之穴名井穴如水之泉也水從此而流則為榮穴又從此而注則為腧穴又從而經過之則為經穴又從而水有所會則為合穴是二十七氣所行皆在井榮腧經合之五腧言五腧而不言原穴者以陰經有腧而無原陽經之原則以腧並之也人罹病時其致疾之原因與邪氣之所在莫不發現於經絡用針者洞燭隱微按穴取之其病可立愈也如病脹者當取胃膽膀胱之足三陽經飧泄者當取脾肝腎之足三陰經邪氣在上者必針於上以取其陷脈濁氣在中者必針其中脈陰經有陽病者當取之足陽明胃經下陵三里穴里陰之病見於上者當取之足太陰脾經膝內下臁之陰陵泉穴外邪高而在外之下者當取之足少陽膽經膝下外臁之陽陵泉穴以及春刺散腧及分理夏刺絡腧秋刺皮膚循理冬刺俞竅於分理之類良以諸病各有所取之經經各有穴穴各有所各病有各病當治之穴各穴有各穴固定之所用針者明乎症屬何經穴居何所勿膠成見勿掉輕心始不至以毫釐之差致成千里之謬非然者認穴不明而亂刺之不但病不能愈反灌他病甚至殺人其害速於槍矛如手陽明大腸經五里穴為五臟禁刺之穴誤刺之則臟氣盡刺胸腹者必避五臟誤刺之則中心者壬癸日死中脾者甲乙日死中腎者戊已日死中肺者丙丁日死中膈者不過一歲必死以及取五脈者死奪陰者死皆坐誤刺之害固不僅如素問所云春刺夏秋冬諸分夏刺春秋冬諸分秋刺春夏冬諸分冬刺春夏秋諸分足以發生種種之病也靈樞經關於針學各篇於諸經之穴論之綦詳有列其行次而言者有指其穴所而言者凡以示人覓穴之法也醫者研究針術務於平時將經脈絡脈孫絡脈之各三百六十五穴會玩索有得使諸經之穴一一瞭然於心目爛熟於胸中庶一旦臨症如按圖索驥如探囊取物得心應手動中肯綮不難矣五臟氣血生養說人同秉氣血而生有春秋逾百歲而形體不敝者有年半百而動作皆衰者其何故哉蓋人之精神氣血有先天有後天先天之精神實藉後天飲食之水穀有以資主而資養何臟之氣血由何臟而生復養何臟五臟相生同於五行有天然一定之次序有相因一貫之功能順之則生逆之則病從之則壽違之則夭試將其理說明之萬物離土不生脾在五臟旺於四時有運輸之功與天時之閏相同故胃納五穀脾司消化提其精華成中焦之穀氣以養四肢成心之陰氣以養神明成木之陽氣以運穀氣一臟已動五臟相連而陰陽作用判焉其陰為血入其所生以養之如脾土津液能生肺金而養皮毛肺金津液能滋腎水而養精髓先天腎水能涵肝木而養筋脈肝木血液能生心火而養神明心火運化能生脾土而資健運惟其相生故能相養血脈因以流通所以心生血而現本色其色赤肝藏血而流不暢其色青脾統血而流甚急其色淡而黃肺納血而化為津其色尤淡而白腎受血而不流其色黑此陰血入其所生以養之之理也其陽為氣入其所克以運之蓋陽氣為水穀之精微入於何臟即化為何臟之氣以養五臟之真氣如腎為水臟受五臟之精而藏之而腎之精液又入心化赤而為血流溢於衝任為經血之海而養肌肉苦歸心而主火氣屬肺而主金心火宣布又能化氣外達而為汗肝主清陽之氣得肺金以制之則木鬱而火清氣得以上升又如脾土之運化由於肝陽之疏泄腎氣之封藏由於脾土之制水此皆陽氣入其所克以運之之理也總之五臟之氣雖相剋而實相成所以氣也血也生也養也流轉不息周而復始互為其根而究其一本之源泉不可不歸功於穀氣百穀秉天地之真氣以生故其氣入土而生肌肉入水而滋精血人能法於陰陽以修行運用穀氣以修神則精神完而氣血足未有不永其天年者
