body:
  text: 慈濟醫話卷二上篇太極兩儀四象八卦圖此圖乃總括初卦先後天卦而集其成也太極可括兩儀四象可括八卦故太極與四象共得五數太陽為乾兌太陽先陽後故乾為陽少陰先陽後故兌為陰少阻為離震少陽先陽後故離為陽太陰先陽後故震為陰少陽為糞坎太陽先陰後故糞為陽少陰先陰後故坎為陰太陰為艮坤少陽先陰後故艮為陽太陰先陰後故坤為陰伏羲畫卦即胚胎於此乾離糞艮所以為陽者因其先陽後亦陽或先陽而後陰皆先陽也兌震坎坤所以為陰者因其先陰後亦陰或先陰而後陽皆先陰也總之先天卦自上而下陽居上為陽盛故為陽陰居上為陰盛故為陰八卦除二卦為純陽純陰外余卦各兼陰陽兩卦太極生理氣象數圖太初理之始也太虛氣之始也太素象之始也太乙數之始也太極理氣象數之始也太初太虛太素太乙皆居太極之後太極生陰陽陰陽生理氣象數故太極為理氣象數之始或問前圖之兩儀陽儀為太陽少陰兩家陰儀為太陰少陽兩家此圖則一為陽儀為陰議為元為亨為利為貞太初太虛合為陽儀分為元利兩象太素太乙合為陰儀分為亨貞兩象是陽儀中為太陽少陽兩象陰儀中為太陰少陰兩象也兩者不同何也曰前圖分論陰陽此圖合論陰陽也若論純者為分駁者為合似前圖系合論此圖系分論不知兩圖以先後分非以純駁分前圖就陰陽初分時析言之後圖則歸納陽與陽或陰與陰而總括其意旨也例如天干分論則甲丙戊庚壬為陽乙丁己辛癸為陰合論則甲乙丙丁戊為陽己庚辛壬癸為陰又地支分論則子寅辰午申戌為陽醜卯巳未酉亥為陰合論則子醜寅卯辰巳為陽午未申酉戌亥為陰又八卦分論則乾離巽艮為陽兌震坎坤為陰合論則乾兌離震為陽巽坎艮坤為陰初卦及先後天卦之遞嬗陰陽始動而生與之卦天地分則天地之卦生而方隅定方隅定則日月生日月生則水火生水火生則四時成四時成則五行生五行生則萬物生於是父母之卦生故初卦變為先天卦先天卦變為後天卦初卦者尚未完全成卦乃天地未分將分之卦也先天卦為伏羲所畫天地之道陰陽之本乃天地已分之卦也後天卦為文王所演既後於天則人生焉君子之道造端乎夫婦乃天地生人以後之卦也三者時期各異故陰陽不同初卦圖一為太虛即一陽為太素即一陰在四象太虛為太陽太素為太陰在兩儀太虛為陽太素為陰分合不同理則一也此一陽一陰為陰陽之始不在三陰三陽之列由是生為少陽為太陽為老陽生為少陰為太陰為老陰蓋一為陽之本變為即成少陽變為即成太陽變為變為即成老陽為陰之本變為即成少陰變為即成太陰變為變為即成老陰或問初卦陰陽次序由少而太而老何也曰初卦陰陽漸生至極而止故由少而太而老猶人之由幼而壯而老也初卦尚未成卦故由少而太而老先天卦圖先天卦以乾為陽由乾右推以兌離震為陽坤為陰由坤右推以艮坎巽為陰是以以陰定位左陽右陰以陽定位左陰右陽故乾居南右兌離震為陽左巽坎艮為陰坤居北左震離兌為陽右艮坎巽為陰此先天卦之陰陽先天卦以為陽之本為陰之本至因陰居中為陰始動之象至因陽居中為陽始動之象由至皆由陽漸陰由至皆由陰漸陽其陰陽消長之次序由而太陽而老陽而少陽而少陰而老陰而太陰而又由而太陰而老陰而少陰而少陽而太陽而循環無端周而復始因其漸也始有太少老三陰三陽或問太陽老陽皆二陽一陰而有太老之分何也曰為陽乃陽極陰生之變變則上爻為陰是陰始加於陽陽尚不純故為太陽又當陰陽交爭上爻漸為陽敗乃變為則中爻動極思靜自反變為而卦成乃次於陽極盛於太陽之卦即次於乾之極陽而又盛於兌之太陽也先天卦自上而下以陽居上者為盛離卦上爻為陽故為老陽兌卦上爻為陰故為太陽此太陽老陽雖皆二陽一陰所以太老不同也或問先天卦陰陽次序就陽言則由太而老而少而漸至少陰老陰太陰就陰言則由太而老而少而漸至少陽老陽太陽何也曰先天卦陰陽已生陰陽生則升降消長循環不絶惟其升降消長之循環故盛極斯削微極斯著猶四時之長夏經秋而至冬隆冬經春而至夏也或問先天卦陰陽由少而老而太即陽卦由震而離而兌陰卦由巽而坎而艮也以跡象論似震為一陽初動之卦巽為一陰初動之卦坎離為陰陽變化之中卦乃論者皆以坎為一陽始動之卦離為一陰始動之卦何也曰震為春為陽卦之始兌為秋為陰卦之始離為夏為陽卦之極陽極陰生故離中虛為一陰初動之象坎為冬為陰卦之極陰極陽生故坎中滿為一陽初動之象至艮巽坤乾為變化陰陽之卦後天卦圖乾與坤合一索而得震再索而得坎三索而得民因乾合於坤故為陽坤與乾合一索而得巽再索而得離三索而得兌因坤合於乾故為陰後天卦自下而上以一為初爻陽加於陰故乾一索而得長男一漸漸而上變一為二爻則成故再索而得中男再上變為爻則成故索而得少男又以為初爻陰加於陽故坤一索而得長女漸漸而上變為爻則成故再索而得中女再上變為爻則成故三索而得少女後天以坎離代乾坤坎離者陰陽之成質居先天之終後天之始先後天之交故坎離交合則生物陰陽之成功也初卦先後天卦比較圖先天以乾坤定位及天塌西北地陷東南遂以乾而補天以巽而鎮地故後天卦以坎離代乾坤先天后天之三陰三陽除巽以少陰變太陰震以少陽變太陽外余皆陰陽易位如先天兌為太陽後天變為少陰離為老陽變為老陰坎為老陰變為老陽艮為太陰變為少陽先天以乾坤定位乃太極陽儀太陽之陰卦因少陰居上陽居下也及以為天則變為太陽因陰始加陽陽猶盛於陰也及以為母則變為少女而為少陰因陰加於陽也乃太極陰儀少陽之陽卦因太陽居上陰居下也及以為地則變為少陰因陰居下而漸升也及以為母則變為長女而為太陰因陰加於陽也余卦類此由先後天卦推及臟腑之關鍵太陽少陽以一為始太陰少陰以為始八卦生方隅始有日月水火而生萬物人以氣血應日月水火以十二經應萬物故以太陰應太陰以少陰應少陰以厥陰應老陰以太陽應太陽以少陽應少陽以陽明應老陽人身一小天地形體之三陰三陽莫非乾坤之三陰三陽此臟腑卦所以可以推而得也次列臟腑卦圖一乃就陰陽分言之陰為陰陽為陽也臟腑卦圖二乃就陰陽合言之陰與陽合陽與陰合也臟腑卦圖一為陽明以應大腸與胃為太陽以應小腸膀胱為少陽以應三焦與膽為少陰以應心與腎為太陰以應肺與脾為厥陰以應心包與肝為壯火以統三陽為少火以統三陰此由人而推及臟腑卦又一變也在後天為中男因陽加於陰故為老陽陽盛於中上下之陰皆弱今因為水陽居中而動則水行故為太陽三在後天為長男故為太陽今因為木陽始升為初爻故為少陽三在後天為少男故為少陽今因得太陽之陽為一得少陽之阻為陽合明故為陽明在後天為中女因陰加於陽故為老陰今因居中靜以應坎中爻之動而成既濟之用故為少陰在後天為少女故為少陰今因地氣將升故為太陰在後天為長女故為太陰今因得太陰之陽為得少陰之陰為二陰合德故為厥陰臟腑卦圖二此與天一生水地二生火天三生木地四生金天五生土之八卦相同如卦中之為膀胱為腎卦中之為小腸為心卦中之為肝為膽卦中之為肺為大腸及兩卦中之一為三焦為脾及兩卦中之為胃為心包八卦應十二月圖八卦應十二月者正二月甲乙木為肝膽當為震卦三四月丙丁火為小腸與心當為離卦五月相火為三焦當為艮卦之上爻六月相火為心包當為巽卦之下爻七月戊己土不胃當為乾卦及巽卦之上中兩爻八月戊己土為脾當為坤卦及艮卦之中下兩爻九十月庚辛金為大腸與肺當為兌卦十一十二月壬癸水為膀胱與腎當為坎卦以地支定六氣司天表辰戌為太陽而北辰居之辰為三月戌為九月辰為春末夏交之際陽氣已旺之時太陽膀胱上升以應之戌為秋末冬交之際陽氣潛伏以養萬物之本而太陽小腸消化水穀即陽氣潛伏之功故應之卯酉為陽明卯為二月酉為八月時在春秋之中少陽在前太陽在後前得少陽之陽後得太陽之陽兩陽合明故曰陽明又仲春為木土當令仲秋為金土當令故大腸與胃應之寅申為少陽寅為正月申為七月時在春秋之首春初為陽氣發生之始秋初為陽氣降收之始一為陰極陽漸生一為陽極陰將生陽氣均不甚旺故曰少陽春盛德在木所屬之干為甲乙膽為甲木居胃與膀胱之間為陽氣上升之樞紐膀胱化氣亦由三焦而上行故膽與三焦應之丑未為太陰未為六月醜為十二月時在夏冬之末陰極於亥而嚴凝之氣至醜方終六月雖長夏土當令實為陽氣將衰陰氣將生之時故為太陰肺主清肅下降之令脾雖屬土而居足少陰厥陰之上陰之下降脾實開下行之路故肺脾應之子午為少陰午為五月子為十一月時在夏季冬季之半子午月為陰陽升降之起點子月陰氣盛極物極必反一陽來復五月陽氣盛極而漸衰陰氣伏久而漸生故為少陰此即乾卦中爻變陰則成離坤卦中爻變陽則成坎之理也離為火心主之坎為水腎主之水火相交則生機潛動萬物從此發生心腎相交則真精內含真光外露神明於是發出故心腎應之巳亥為厥陰巳為四月亥為十月時在夏冬之首脈解篇以三四月為厥陰因夏初為萬物已筍之時陽氣雖發於外而冬日末淨之陰氣尚伏於中故為厥陰又一陰生於午月至亥月而盛極故亦為厥陰肝主藏為陰中陰心包為陰故心包與肝應之或問辰戌為太陽卯酉為陽明云云此三陰三陽之地支以年言乎以月言乎以方位言乎抑均包括在內乎與五運六氣之盤位不無異同例如本年甲子在五運六氣之盤位主運初運為木客運因甲己合而化土初運為太陰主氣初氣為厥陰惟客氣初乞為太陽與子午為少陰之說不同何也曰子午言六氣當以風熱火燥濕寒定之甲已言五運當以藏生統化受定之無論以年論以月論或分論或合論皆一理也三陰三陽由分而合分則陰為陰陽為陽也合則陰與陽合陽與陰合矣再詳論之陰陽未合時子午為少陰子午為南北少陰為心腎是北方子位南方午位均為心腎也及陰陽合則少陰腎與少陰心分離而與太陽膀胱合居於北方坎水而為子又少陰心與少陰腎分離而與太陽小腸合居於南方離火而午陰陽未合時卯酉為陽明卯酉為東西陽明為大腸與胃是東方卯位西方酉位均為大腸與胃也及陰陽合則厥陰肝與少陽膽合居於東方震木而為卯太陰肺與陽明大腸合成於西方兌金而為酉陰陽未合時辰戌為太陽巳亥為厥陰分居東南與西北是東南辰位西北戌位均為膀胱與小腸東南已位西北亥位均為心包與肝也丑未為太陰寅申為少陽分居東北與西南是東北醜位西南未位均為肺與脾東北寅位西南申位均為膽與三焦也及陰陽合則太陽小腸與少陰心合由東南而居於南太陽膀胱與少陰腎合由西北而居於北太陰肺與陽明大腸合由西南而居於西少陽膽與厥陰肝合由東北東南而居於東其原在東西卯酉兩方之陽明胃與原在東北方之太陰脾合原在西南方之少陽三焦與原在西北方之厥陰心包合分居乾艮巽坤四隅皆為土而為醜寅辰巳未申戌亥此陰陽之合也臟腑應十二月圖臟腑應十二月者子月為膀胱丑月為腎寅月為膽卯月為肝辰月為小腸巳月為心午月為三焦未月為心包申月為胃酉月為脾戌月為大腸亥月為肺此段意出難經再詳推之陽生於少陽故歷建寅建寅故寅卯辰為春屬於肝巳午未為夏屬於心午未申為長夏屬於脾申酉戌為秋屬於肺亥子醜為冬屬於腎陰陽離合升降之變化則主令之各異雖變化無窮然有定理有定法絲毫不紊也陰陽已分而五行未相生圖天一生水故甲乙居坎而為水地二生火故丙丁為火而居離天三生木故戊己居震而為木地四生金故庚辛為金而居兌天五生土故壬癸居乾艮巽坤四隅而為土甲乙居坎而為水者乃陰陽未分將分而五行未相生也甲乙為十干之首水為五行之首故甲乙水也五行相生方位圍震為長男在人為少陽在時為二月時值春陽之首故震為甲乙木生火則離為丙丁火生土則乾艮巽坤為戊己土生金則兌為庚辛金生水則坎為壬癸五行以土定位變化圖天干甲乙丙丁戊為陽已庚辛壬癸為陰五行土氣最厚而居中甲為陽之首己為陰之首以土定位則甲己為土土生金故乙庚為金金生水故丙辛為水水生木故丁壬為木木生火故戊癸為火無論如何變化不外此理天一生水地六成之地二生火天七成之天三生本地八成之地四生金天九成之天五生土地十成之伏羲取象河圖引而伸之為一圖而成陰圍陽為水又因坎卦始於一陽故曰天一生水取象河圖引而伸之為因一而成陽圍陰為火又因生於兩個故曰地二生火取象河圖變而為以成適得離卦之初爻二爻但兩爻不成卦又加坎卦三爻而成因此卦起於適合離卦之兩爻加坎卦之一爻一二相加故曰天三生水取象河圖變而為以成適得離之陰爻而上升二二相成故曰地四生金取象河圖而生四卦伏羲本河圖畫八卦一二三四已有坎離震兌四卦其乾坤巽艮四卦系由而生三生於生於三生於三生於再五個之象每均有一陰一陽蓋及五陽餘一陰其一陰為餘數並於五數中之一數內仍化為陽而為五陽及五陰餘一陽其一陽為餘數亦並於五數中之一數內仍化為陰而為五陰五陰五陽相合仍為故曰天五生土此為一加四之數其餘之一及即相火故四行與土成則土為五土與四行成則土為六例如卦加之四卦則為之兩卦卦加之四卦則為之兩卦天一生水加土之五為天一加天五則成六六為偶數偶數為地故曰地六成之地二生火加土之五為地二加天五則成七七為奇數奇數為天故曰天七成之天三生木加土之五為天三加天五則成八八為偶數偶數為地故曰地八成之地四生金加土之五為地四加天五則成九九為奇數奇數為天故曰天九成之四行成土得奇則為天得偶則為地奇為天數偶為地數也土本身之數為五分其餘之相火則為六土旁四行加四行則為十故曰地十成之或問前釋天五生土不曰二加三而曰一加四何也曰例如為一陽爻五陰爻在卦為艮為坤艮在後天為陽坤為陰陰陽合成六爻之卦析之則為為少陽為太陰此六爻系一少陽加二太陰為四陰爻以二太陰之四陰爻加少陽之一陰爻得數五故非曰一加四不可五運圖起運之法不一以陰陽論由冬至起以氣候論由立春起以氣交論由大寒起三者各有所主不容是此非彼但以冬至起運之說為較長由去年冬至冬至陽生故去年冬至為本年春之始至本年立夏為角運立夏至夏至為徵運夏至至立秋為宮運立秋至立冬為商運立冬至冬至為羽運年凡五運但五運初二三四終之序隨年推移非屬固定例如丁壬之年初角運二徵運三宮運四商運終羽運戊癸之年初徵運二宮運三商運四羽運終角運甲乙之年初宮運二商運三羽運四角運終徵運乙庚之年初商運二羽運三角運四徵運終宮運丙辛之年初羽運二角運三徵運四宮運終商運或問除丁壬年外餘年之角徵宮商羽五運先後次序不免倒置何也曰因司天在泉間氣之不同是以各異也六氣運行甲子相乘合而復離周而復始如環無端故司天在泉以六十為一大會茲再揭六圖之一以明之舉一反三余皆例此太陽為坎而居水寒氣應之則為寒因太陽為寒少陰當然為熱坎離已定寒熱已分則陽明為燥太陰為濕少陽為火厥陰為風此陰陽合而復分之象也假設少陰居南則太陰居西南厥陰居東南陽明居北則少陽居西北太陽居東北此離陰陽之本而言陰陽故少陰居南陽明居北即難經旺水由少陽起傷寒由太陽起之理也或問三陰三陽之司天其初氣與四氣互有不同何也曰六氣起運以三終定位以初四為首三陰三陽之比較初氣四氣互易其位因以類求類也故陽氣司天則初氣起干司天左間陰氣司天則初氣起於在泉左間或問足厥陰肝足少陽膽皆木也手少陰心手太陽小腸皆君火也手少陽三焦手厥陰心包皆相火也是太陰脾足陽明胃皆土也手陽明大腸手太陰肺皆金也足太陽膀胱是少陰腎皆水也而論六經者舍膽取肝舍小腸取心舍心包取三焦舍胃取脾舍肺取大腸舍腎取膀胱何也曰以陰陽論腑為陽臟為陰氣為陽血為陰六腑中膽與小腸與胃皆為化水穀之械三焦則輸氣之機大腸則通氣之府膀胱則化氣之源也三陽主氣故舍膽小腸胃取三焦大腸膀胱六臟中心包與肺與腎皆為布精輸血之臟肝則藏血心則生血脾則統血也三陰主血故舍心包肺腎取肝心脾是以三焦大腸膀胱為氣之源肝心脾為血之本或問司天在泉以間氣推之固無疑以生克推之似難通少陽火司天則其母厥陰木在泉陽明金司天則其所不勝少陰火在泉太陽水司天則其所不勝太陰土在泉厥陰木司天則其子少陽火在泉少陰火司天則其所勝陽明金在泉太陰土司天則其所勝太陽水在泉或由子而母或由母而子或由所不勝而所勝或由所勝而所不勝種種不同何也曰以陽精所降陰精上奉之理推之自無所不通陽氣能降必有樞人以少陽為樞因為樞紐故陽下降當歸根於母此子司天母在泉之理陰上升當筍子而上達厥陰為木筍子則生少陽火而上達此母司天子在泉之理陽下降陰必侵之此所勝司無所不勝在泉之理陰上奉陽必助之此所不勝司天所勝在泉之理或問陰何以侵陽陽何以助陰曰就陰陽升降言之陰常靜其氣易保陽常動其氣易散此一證也就陰陽內外言之陰生陽長陰內守陽外衛陽皆助陰非僅前言太陽陽明也即陰偏勝時陽仍可外衛俾陰得內守設陽偏勝時陰則以靜制功此又一證也是以陽病見陰脈多死陰病見陽脈多生陰虛可療陽虛難治即此理也三陰三陽與八卦五運配合圖三陰三陽生於太極化為卦爻配合干支包羅萬象此陰陽與八卦五運相合之理也天干為五運地支為六氣講運氣宜先考日月寒暑水火與氣血之關係然後以二十四節氣合八卦應臟腑自得要領但運氣與曆書不同曆書以甲子為標識運氣以六氣定甲子依曆書干支推算之本年為太陽司天實則去冬燥甚倘泥太陽司天之例以醫病恐十活一二而已何者去冬既燥今春當為陽明司天四時氣候既乘其常則運氣之推算不特不可以六十年計且不可以年計直可權以季計本季燥下季當為陽明司天本季熱下季當為少陰司天本季寒下季當為太陽司天本季火下季當為少陽司天本季風下季當為厥陰司天本季濕下季當為太陰司天緣風熱火濕燥寒一侵臟腑則臟腑立失藏生統化受之能無論六十年或一年或一季久暫雖異感受則同故善醫者彰往察來神而明之存乎其人運用之妙在於一心未可執一以從事也天之五行五位五氣表以地氣上為云天氣下為雨之理考之天有五行言天受風熱濕燥寒之鼓盈而有霧雨露霜雪之五行因天之霧雨露霜雪以御氣之和急緩散聚因氣之和急緩散聚而生風熱濕燥寒其理如環歸於太初或問地之五行土旁溉四行天之五行有旁溉四行者否曰濕是也濕上蒸為露遇風為霧遇熱為雨遇燥為霜遇寒為雪故天之五行皆有濕人之五藏五氣五志表天地人之五妙五行五運表藏之究竟為生生之究竟為統統之究竟為化化之究竟為受受之究竟又為藏其理如環周而復始此五運之究竟也五行之真氣性味表慈濟醫話卷二下篇論本內二經看書須要神化既不可泥於書又不可隨意駁本內二經尤難理會吾對此二書寧可慢講使多幾人明白不敢粗粗過去二書講畢他書自易領會學醫不可分門戶宜宗本內二經近日治病有三大論一吐汗下之法一辛涼之法一理脾之法主吐汗下者謂邪中於人不用斯法邪無出路主辛涼者謂人賴陽氣而生熱多寒少既有寒亦隨陽化熱不用斯法其源不清邪焉得去主理脾者謂人以脾胃為主脾胃壯正氣自足邪無由入脾胃弱正氣自虛邪乘而入故正氣虛者邪氣盛不用斯法不能立本邪何能除三說皆理圓意暢反使學者有一國三公之勢不知人之邪氣盛亦能煎耗正氣正氣虛邪氣亦能乘之內本無熱初感風寒亦不能遽投辛涼之劑吐汗下創自仲聖條理分明立法嚴整皆因病以施法無臆度武斷之弊辛涼創於二吳然瑕瑜互見已稍去仲聖之道黃氏宗東垣創理脾之法執一之見又在二吳之下然二吳及黃氏亦頗各具隻眼不失醫中之傑但後之學仲聖及二吳黃氏者不能會通其義強分三派私立門戶互相傾軋醫道一落干丈吾人論病首當揣情度理分寒熱虛實不可以無情無理之門戶自相束縛敖吾主學醫由本內入手即斯意也學醫宜矯時弊人身強弱不同氣血運行遲速自異邪之中人亦因有深淺故病同而治異若內傷之病血氣自虧非僅藥餌所能奏效當用藥以調其已傷兼自養而勿使再傷庶足以起沉菏今人治病或深信藥力或不信藥力或輕重不免失宜或出奇動思制勝或束於書或泥於忌或貪功妄進或膽小不進雖皆小誤實關身命要為醫家所必忌至學識僅限於湯頭閲歷不能辨表裡雖語此而弗明更不足責矣故初學者教其入於正軌升堂者教其進而入室世俗種種之陋習當掃而空之查中醫以俗法為祕訣向無開誠之討論以傾軋為慣例從無相助之大義以上諸恥希諸子引為己責以洗之不特開醫學之光明且益彰醫道之廣大學醫貴知新學問不在駁人而在翻新吾講內經雖弗佳無一句不從經文無一句不按經旨雖刪改者有之杜撰者有之要之非不尊經不過翻新其義而已內經除主要者吾已發揮其不主要者待學醫諸子翻新希留意學醫之步驟張君問本人學醫之步趨是否有誤曰學由本內難三經入手自異庸俗仲聖之學淵源在此因證立方法極正確論症嚴整不紊論方君臣不亂允推正則俗醫不達非逾越法度之外即泥守章句之中君以數學推運氣以病論方雖未盡善然亦足濟世君如好之希共同討論改革中醫庶可放光明於世界吾嘗論後人不知注書僅知著書以致真理晦沒精粹蕩然僞而亂真貽人譏消反疑古籍為方士之書殊堪浩嘆又其甚者無交換學識之公心有黨伐異同之私見無怪醫道愈趨愈下也學醫至上之法學醫之士取下法者為讀湯頭取中法者為講脈訣取上法者為推求醫理但皆不足為至上之法至上者醫理藥性皆宜貫通大小通澀之方亦宜洞徹蓋配方之制非具以上學問不能合宜果於醫理藥性方制三者統籌兼顧化而為一配成方劑始臻妙境此條言之甚易行之維艱希諸子力爭上游醫道始昌配方之法配方之法雖用藥不同但易一二味則功用大差例如理濕之用鮮生地佐滑石若去滑石則失理濕之能如養陰之用生地元參若雜茯苓則功用盡失湯劑有僅用君藥一味為一劑者有佐使配合至二十味為一劑者今人以專用一味不能收功過十味則曰太雜不問君臣佐使之理僅隨意開藥七味或九味為一劑而曰古方古法吾不知其可也立方之道為醫者所必須然無真實學識不能立嚴整之方自來雜亂之方固不可取泥古之方亦多誤事立方宜先審病之標本再嚴定君臣佐使俾藥與症針鋒相對無懈可擊是以嚴整之方加減一味增損一分則效力全失雖然欲於今時之醫界求嚴整之醫方殆幾希矣諸子其精研詳究自能出巧而成嚴整之方古無祕方古人傳醫有大道無祕法所謂祕者皆後人矯揉造作藉聳聽聞之語即醫案各家亦半出於造作並非真相吾講醫書不敢謂宣傳奇祕但亦堪信稍補醫界所不足觀仲聖之方對症下藥意密法整何等慎重豈三五味至數十味藥之死方徒事捃拾不論症象自詡不傳之祕者所可同日語也審症當察天時及病因人於天氣亢旱之時陰無不虧熱無不盛故看春病宜先度春之燥潤再度去冬之燥潤然後查病因之為寒熱表裡虛實以定用藥之標準庶病者免死於藥否則執一以行差如毫釐謬以千里矣人身之病在經在衛在營在腑在臟名目繁多認症略疏變象立起雖有簡便之方亦多旁途此層不可不想一極正確極簡便之法蓋病類雖繁不過陰陽而已推之亦不過氣血而已再推之又不過寒熱虛實四大綱耳只須有精密之審切自少錯誤臨證之要臨證雖難只要將大法認定自少錯誤初臨症者如遇大症先宜以輕劑問之倘有經驗則宜用大劑攻之病體早愈一日早養一日正氣論陰陽醫學之理首在陰陽陰陽之理既精且細或曰陰陽名目繁多令人難辨是陰陽無一定之理也以無定之理之學而治病豈能斷生死起沈痾此一說也或曰陰陽顯甚如人則背陽而腹陰物則表陽而里陰推之萬物陰陽判然是陰陽甚易知易知若此豈不盡人而醫耶此又一說也然則欲知陰陽之理難乎易乎曰知之則易用之則難陰陽有定而無定亦無定而有定或以理而推陰陽或以氣而推陰陽或以象而推陰陽或以數而推陰陽倘能因時而用自爾妙化無窮要之不外平衡而已反是則陰陽錯亂變端百出矣燮理陰陽之謂何論五行以制勝生成論五行始知五行變化之妙若以生克論五行則為五行所拘反不得其妙若不以制勝生成或生克論五行則大法已失可隨意顛倒不復成五行矣故五行之理至活而至嚴論風風善行而數變八節不正之風或害空竅或走經絡或傳臟腑逮久蘊內動或鼓熱而作厥或助寒而成痿或耗氣而盜汗或煎液而成痰七情六淫莫不由風媒介之故風為百病之始虛風正風之分邪風是正風因邪風雖害人然能生殺萬物也動作鼓蕩之風人力所為者為虛風於人雖無大害於物實無生殺權故曰虛風風為熱者因熱極而風故風為熱論五音角徽宮商羽角音調和而亢直徽音和美而柔順宮音重濁而宏大商音高揚而流利羽音沈著而穩固春萬物始生其調亢直以應生夏萬物生榮其調柔和以應長長夏為土故調重大以表其獨厚秋主收斂故調高揚以應之冬主潛藏故調沈穩以應之此其正也又因音有高低故有太少之分又因天地人之不同陰陽升降之變化故上應天中應人下應地而有上中下之分蓋每音均有太正少及上中下以應三陰三陽太正少為陰因本音之變音故為三陰上中下為陽因陰陽升降之變音故為三陽要之本音變音為靜非本音變音之變音為動五味之所欲五味所欲經無明文然考其義以酸收苦堅甘緩辛散咸軟之理推之以同氣相求之義證之是收堅緩散軟即酸苦甘辛咸之所欲也九竅與臟腑之關係九竅司五臟盛泄之職耳能聞可長心思目能視可和肝鼻能嗅可養肺口能食可納五穀而養臟腑二陰排泄渣滓以清臟腑故人能為萬物之靈咽嗌之解釋上曰咽下曰嗌合而言之曰喉嗌法地即咽喉之下口臟腑相表裡臟腑賴募原而相連因作用為表裡心與小腸相表裡者因小腸布氣之變化賴心液之流通也腎與膀胱相表裡者因膀胱化氣而藏液賴腎受血而灌輸也肺與大腸相表裡者因大腸之排泄賴肺氣之升降也肝與膽相表裡者因膽汁之變化賴肝之條達也脾與胃相表裡者因胃之消化賴脾之消磨也腑屬於表臟屬於里例如人之飲食水穀先入胃排粗布精始由腑而入臟內經云壯火食氣少火生氣似近此理募原之解釋問臟腑賴募原而相連募原何物也曰募原即隔膜但橫為隔膜豎為募原以形論為網油以象論為三焦譬如銅煤油燈統全部名之曰燈曰銅燈分一部論之有燈罩燈托夫燈猶三焦也銅燈猶網油也燈罩燈托猶募原隔膜也四名等於一物故合三焦網油募原隔膜等各而一之曰三焦而已問募原有半表半裡之說信乎曰半表半裡以氣化論耳如不以氣化論肺可為太陽膀胱可為太陰兩感於寒之解釋問傷寒論兩感於寒何所謂也曰兩感云者既感於腑復感於臟也問兩感是否同時曰不同時腎為先天胃為後天以氣血論氣為先天血為後天以臟腑功能論臟以腎為要腑以胃為主胃雖賴脾為消化實賴腎氣以養之腎水以潤之然後脾之消化始能化水穀以養形臟是以胃之功能因腎之技巧始能施其功能蓋腎無胃不能施其巧胃無腎不能行其職故以功能論腎為先天胃為後天後人不明腎陽腎陰之理謬指腎氣為命門更有以腎為炊之說明其義不知其理無怪有指鹿為馬之誤脾藏意意靜而生動脾為太陰其性本靜又司運化從靜而生動故藏意脾之動用土賴天之雨露地之泉水而生萬物然有生即有長有長即有收有收即有藏故土在理言之則法天地主四時在人言之則升降陰陽旁灌四臟胃主鳳肺主皮毛而通天氣又與大腸相表裡胃上通於肺下通大腸故能主風胃行氣於三陽胃陽明之氣能行於少陽而助運化又能行於太陽而化精微逼糟粕脾行氣於三陰脾太陰為老陰少陰為所勝厥陰為所不勝此一說也貫胃屬脾絡嗌此又一說也脾貫胃絡隘乃脾絡之行也至脾統三陰者乃太陰為統萬物所歸況脾為厥陰少陰之開脾血脈功用又相連貫膽可稱奇陽膽雖藏有膽汁然既非如臟之化血又非如腑之化氣不過承濁於肝布汁於脾胃助其消化因有納布之能故偏於陽其作用別於臟腑又偏於陽故可稱奇陽君火相火問何為君火相火曰姑不論君相火先要明何謂火以壯火食氣少火生氣之理證之火非真火即氣也設真有火則臟腑焦爛矣壯火是腑中吸入之氣少火是臟中呼出之氣氣是少火之精而溫肌肉者小腸承胃之氣輸於三焦由三焦送各腑而達各臟心承腑之氣輸於心包由心包達各臟以養肌肉故在腑小腸為君火三焦為相火在臟心為君火心包為相火論榮衛榮衛即血氣血氣以體言榮衛以用言也然榮行脈中衛行脈外榮衛並行於全身分五十度每晝夜運行一周榮血周行五十度復返於肺與衛氣相會衛氣周行五十度亦返於肺與榮血相會每五十度之中榮衛各當令二十五度榮當令於夜自午至子榮出而衛入榮氣略呈衛氣略伏衛當令於晝自子至午衛出而榮入衛氣略呈榮氣略伏榮衛晝夜循環有如日月但日月不相見而榮衛不相離也故子午二時為榮衛當令二十五度之交點再榮雖外出決不能達皮衛雖內入決不能至骨二者互為當令僅可分別氣之盛衰不能過分位之內外也論脈人身筋經絡皆有動脈是以督脈在筋任脈在經寸口在絡內經論脈以胃氣為主以血氣為宗以弦鉤毛石綏而定臟再以浮沉中而候上中下三部腑屬於臟則未深論難經推廣之脈經又闡發之以寸關尺而定臟腑又以浮為腑沉為臟外感為浮內傷為沉但精確皆不及內經然吾人取脈先宜以綏急推胃氣之盛衰再以弦鉤毛石綏推臟氣之所在再以浮沉及寸關尺之盛衰推及表裡氣血然後再以寸關尺參看臟腑之盛衰得其所在察其外證嚴立方脈自無大謬脈為醫之大疑吾早擬略論之但知脈者甚鮮今諸子對脈既入手研究特論述以示正軌問胎脈如何曰婦人受孕則陰脈滑動陽脈滑大自來氣血搏結者無論病之有無脈必有力而動若滑則無病無病而氣血搏結者妊也問尺脈浮為女子不月之脈有是說乎曰有則有之但妊而感冒尺亦浮滑論脈之法當以外證之所現察氣血之所傷以氣血之所傷進而推求脈之理如代陰脈遲當用白虎代陽脈數當用理中以此推之思過半矣否則執一以求膠瑟刻舟胡能論脈問在寸為肺脈浮沉皆為肺病乎曰浮為大腸沉為肺故浮而短澀病在肺浮而長大病在大腸此指右寸一部之理言若治病則當考其全體之證不可囿於一部之理問沉脈亦有大腸病乎曰沉而散溫在肺沉而實病在大腸若以浮沉言則腑浮而臟沉若以病言則又當以邪正考之不可限於浮沉也此脈之妙用也問治病診脈是否應診全部曰外證考脈全部及尺寸皆當考察益人之所以生者賴氣血流動耳病無論表裡虛實經絡臟腑皆由氣血不調所致脈因氣率血行而現寸口故氣血不調者脈象必變外證考脈當先察全部後審尺寸若六脈皆浮而嗽肺病也若右寸浮大便燥腸病也問弦脈主何病曰六脈弦肝病也左三部弦膽病也右三部弦食滯胃病也脈等弦也而變化無窮若參透內經脈經則知其妙今人僅知默誦脈訣誠捨本逐末矣問弦為肝脈左三部弦其理易曉右三部弦其理安在又何以知為胃病曰肝膽胃病三者俱載於經但未剖別其理耳肝脈當弦肝藏血肝為邪乘血與邪搏故六脈皆弦邪在肝之表而未達肝且肝膽又居左故左三部弦設弦而不沉雖六部亦為膽設左關獨弦沉亦為肝胃有滯作痢肝失疏泄胃居右部食滯胃病故右三部弦問趺陽脈何屬曰趺陽同衝陽穴名在足背屬於胃脈問奇經八脈之所在曰由三陰三陽推之督脈在背為陽任脈在腹為陰故督脈屬於太陽任脈屬於太陰帶脈屬於厥陰衝脈屬於陽明二蹻屬於陽明二維屬於少陰再參經文考外象自然少誤如腰痛脈浮緊則督脈為病脈沉弦則厥陰為病寒邪熱邪邪無寒熱以人氣血之寒熱為寒熱氣血寒則為寒熱則為熱始霍亂邪正相爭也熱盛為陽寒盛為陰在未分陰陽時刺可立已在既分陰陽後非藥不瘳虛實虛虛氣虛陽猶內伏故為合症得生虛症氣實陽華外露陽將脫故為反症必死虛實指正氣而言蓋歷邪而傷氣氣在內受邪克而虛是邪正相搏之時及邪勝而深入陽敗而外竄反實故死即外強中乾之理也生陽死陰不治之理心肺在呼吸為陽在臟亦為陽陽氣將竭則陽中之真陰始消肝腎在呼吸為陰在臟亦為陰陰氣將竭則陰中之真陽始露故死陰生陽皆不治內傷病難痊之理人之患病多由自失檢點飲食能養人亦能病人飲食過量易滯於腸胃則腸胃垢生內蘊邪熱外感寒涼病因以生有謂內傷由勞纍而得者不知勞纍能活筋骨壯肌肉不能病人故農家少疾病多壽考內傷雖關七情約之則二曰欲曰鬱而已欲則傷腎鬱則傷肝水不濟金木以剋土則病成焉內傷本可治便以欲字已難去郁字尤難去欲字尚可勉強使之去郁字斷非涵養不能去是以內傷多難痊痓與痙之別痓乃陰陽俱虛火邪內灼急而為痓痓抽搐後筋不舒故筋先抽而後痛痙乃濕邪內蘊蒸筋作痛痛而筋動作抽故筋先痛而後抽嘔之分別嘔而有物曰吐嘔而無物曰乾嘔欲嘔不能分乾溼嗢嗢然如有物欲嘔曰欲嘔鬱郁然膈不舒而欲嘔曰喜嘔悶悶然氣不暢欲嘔而未嘔曰善嘔喘之分別問陽明厥喘因入經入臟而判生死入經入臟從何知之曰大喘則知其入經似喘而汗出如油則知其入臟蓋熱蓄於胃使各腑失其升降之能胃之熱復上蒸於肺致濁氣與肺氣相爭故大喘及熱入肺則肺焦枯欲大喘而肺已傷其呼吸必不便故似喘肺傷太過精華外走故汗出如油泄之分別問寒泄熱泄濕泄滯泄之分曰分別之法不可拘定一視口之渴否二視溺之或短或長或清或赤三視腹之或脹或痛四視脈之或弦或滑或沉或緩或數或遲當得要領再參以他證及日數則分明矣論今春之病不發燒而脈沉細之故甲子春去冬氣燥蘊積臟腑今春寒熱不定又少風以應時春既失風之宣發則人受寒受熱而無風可受是以燥氣不得宣發而蒸金故嗽症居多次喉次痧疹因其不得宣發故脈沉細而厥逆治法養陰清裡則生溫散辛表則死今春之症雖脈沉細而厥逆但口不渴即干鼻雖流清涕而目起矢小便不赤即短大便不燥即泄皆火盛陰虛之象也胃脅串痛大便不燥口不渴之治法甲子春現在時症以胃脅串痛大便不燥口不渴者居多此乃寒熱相搏肝陽氣逆之故治法宜用厚朴杷葉蘆根鬱金香附莪朮姜皮軍炭豆蔻石斛蓁艽代赭石等品忌用二冬鮮生地鮮石斛元參生軍等品少陽司天之病症及治法甲子夏現交夏令人皆以為少陰司天不知今春無雨而寒陽氣未得發越春既未得發越夏必發越又因春寒而火氣內閉其發越者必火也少陰本宜暑熱而主靜若火氣發越則司天者為少陽非少陰矣少陽為三焦與膽三焦為決瀆之官人必貪飲霍亂必應時而起法宜香薷飲膽為中正之官人必患耳聾頭昏法宜白虎湯佐清解少陽司天則厥陰在泉厥陰為肝與心包人必多熱病及卒然昏倒熱病法宜大涼養陰卒然昏倒法宜香竄開竅之品按本季病之治法以清解為主香竄次之陰柔又次之陰柔除熱病外不可妄投以鮮生地佐滑石或鮮石斛均尚可用至二冬元參等品均宜慎之又此病預防法宜常服益元散夏末秋初宜用之藥品吾於春末已言宜用香竄苦寒之品今夏季將終濕已大行太陽有司天之象辛溫之藥可先少用無妨滋柔之品非其時也夏多虛症夏何以多虛症蓋夏令繁華外秀既外秀故內虛又夏日陽氣外泄內必空虛內經四氣調神論篇言之綦詳治瘧之方甲子秋以現令論瘧之熱多冷少者宜桂枝白虎湯加減之冷多熱少者宜柴胡承氣湯加減之脾寒者當用紅砒黑虎丸久瘧者當用青蒿鱉甲湯加減之紅砒黑虎丸以紅砒黑豆制之每豆一兩加砒二分粒如小豆子水打成丸病較輕者服一丸忌熱忌食忌烟宜涼宜走治瘧者或以邪在腠理立柴胡湯以汗之或以邪深入臟立理中湯以補之或以十二經皆有瘧立法紛紛奠知孰是吾論無論在經在腑在臟既均作寒作熱又皆發於胃氣故以清胃為法熱甚以石膏清之寒甚以紅砒溫之但紅砒重量不得過二釐服砒後勿坐勿食須飲涼水或冰須遠行柴胡湯之法固因寒熱莫辨愛立是法俾邪從腠理而解也不知此症得之於腠理輕者可痊重則難效吾謂熱者用白虎湯熱甚者用牛黃寒者用承氣湯寒甚者加白朮佐紅砒凡瘧皆當清大腸承氣湯雖大黃苦寒然枳殼有下胃氣之力薑朴有逐胃寒之功故生軍佐石膏則清胃熱佐薑朴則理胃寒若胃中寒熱相結以承氣湯為主熱甚於寒者加重生地減輕姜朴寒甚於熱者加陳皮木香水氣聚結堅固為寒寒固可用附子熱亦可用少許附子為引以鎮水氣然此法不可妄用問瘧作寒作熱之原因曰三焦與心包主輸送營榮之別臟寒熱之作乃由寒或熱搏於胃氣致胃氣失其升降之能故肺與大腸因而絶其表裡相應之力則寒熱作矣瘧疾寒熱之作與他病寒熱之作不同他病寒熱之作邪有定所瘧則邪無定所故專重治胃以胃為後天統主五臟六腑之氣血而為五臟六腑之大源也問痎瘧之分曰痎者風熱相結也瘧者陰陽相爭也其先寒者乃三陽虛也陽虛則陰盛陰盛故寒其後熱者寒極生熱也連日作者邪在腠理也間日作者邪將薄腑也問截瘧用常山於法當乎曰常山消水溫脾治瘧可用截字於義無取論傷寒傷寒包括甚廣故仲聖金匱無溫症一門已賅於傷寒中也或曰傷寒與溫症為兩種或曰仲聖溫症一篇已遺失究之推度揣測毫無根據試讀內經何嘗不明言冬傷於寒春必病溫冬不藏精春必病溫耶論脫骨傷寒此疾乃陽明症或因藥誤或因失調致將邪熱攻入少陰由少陰蒸入厥陰諸節屬於筋故按節潰爛或因邪熱伏於骨中由骨空之節而蒸筋故曰諸節潰爛脫骨傷寒總之因始陽傷於寒漸至邪熱脫落於骨中也脫骨傷寒分陰陽熱邪曰陽寒邪由陽入陰曰陰屬於陽者十愈六七屬於陰者十愈二三各症問答十七則問治痧疹之用藥曰痧疹治法宜用鮮生地鮮石斛鮮蘆根生軍生石膏二花連翹知母寸冬甘菊薄荷大青葉茵陳木通通草梔子黃苓川連羚羊犀角紫雪牛黃等品忌用元參天冬荊芥葛根柴胡麻黃浮萍三甲防風二活當歸紅花等品再痧疹回緊之治法惟通里氣一法可救蓋何愈之候為毒漸散離體而播於空際回緊之候為毒忽陷循際而深入臉理初非真有回緊回遲之不同也問喉症之治法曰喉症不同濕熱閉症牛蒡子豆根苓連皆可用白喉宜養陰濕熱宜疏解宣下忌養陰起白非白喉亦有陰虛不起白者蓋白喉之白與非白喉之白有別不潤者為白喉若有白而二便利口渴不思飲者非陰虛若無白而二便不利口渴思飲者為陰虛論症當互證情形不可拗執一隅謂白喉為陰虛之一種則可謂有白即為白喉則不可問喉症有頭熱身不燒口不渴吐泄脈沉細者如何治法曰此濕痹喉症也且因痹而陰虛先宜牛蒡子豆根清宣之品利止宜大生地正元參鎮潤之劑吐者宜清宣兼下法生軍可用問養陰清肺湯有以為治白喉之主藥者有以為治白喉之毒藥者緣用之或收奇效或見敗象結果不同持說乃異未知孰是曰白喉由於陰虛故起白硬而少液養陰清肺誠對症藥也況症有輕重在忌表抉微亦不專限於養陰清肺湯也後人不細讀僅學其方不學其理致有濕熱潰爛之喉亦視為白喉誤投養陰劑者豈能奏效耶不悟用法之非反誣立法之是一誤再誤靡所底止不可以不辨問癲狂癇諸症之別曰狂屬陽癲屬陰故重陽為狂重陰為癲初得時辨之癲則口吐白沫而面白唇青狂則否查其形狀凡語言罵詈不避親疏聲高氣粗為狂語言呢喃時作時止為癲最重要者在查其目目直而神不定為狂目直而神時清時不清為癲癇症有二種一胎毒入於厥陰多得之於童年一由悶郁傷肝多得之於成年治之之法古方雖有但難去根癇驚是因驚而癇癇與風不同風如卒然中風之類癇時作時止如羊角瘋之類然風與癇皆得之於驚此乃臟腑為熱所煎猝逢驚恐熱氣上逆故在臟則為風在腑則為癇問邪在大絡法宜引經之理曰邪不入經而流溢於大絡者十五絡內之五臟絡曰大絡謂之奇邪法宜用藥餌將大絡之邪引入在經以便施治緣人身之形臟以經為斡以絡為束有如以骨為斡以筋為束之理邪中絡時其邪雖輕藥則難達雖有香竄藥可以達絡然或因熱邪或因體虛往往弊害立見故不如先引絡邪使入六經再施相當之法或補或瀉邪自易出問逢冬作嗽之治法曰咳嗽之病不一其類逢冬必犯者最多此症早輕暮重脈洪者為陰素虛及冬陽氣潛藏陰虛陽擾而作嗽當用鮮生地元參以固陰杷葉蘆根以利肺即可若用酸斂或宣通品則難效問某君頭痛壯熱肢冷惡寒口不渴唇焦有泡溺赤便燥脈沉此何症治宜何法曰此症頭痛似表肢冷惡寒似陽微口不渴似濕然認表脈不浮認陽微脈不微認濕唇不滑壯熱唇焦有泡溺赤便燥乃系熱鬱於裡蒸為壯熱其唇焦有泡者熱不宣也故滋赤而便燥其肢冷惡寒者陽為熱鬱也口不渴者熱未發越也故脈沉而不洪法宜通里清熱白虎承氣湯加減之用生石膏生軍小枳實知母黃苓川連生草等藥問某君四肢厥冷作搐脈微系何症治宜何法曰陽虛不達四肢以致厥冷作搐法宜助陽附子三錢陳皮三錢人參一錢甘草一錢生薑二錢半夏三錢桂皮二錢問某君畏冷口渴氣促喜臥尺寸俱大此何病治宜何法曰陽明為多氣多血之腑若有滯熱則有餘脈現故經雲陽明脈大傷寒以陰陽俱大及洪大為陽明之脈是以陰陽俱大系滯熱鬱於胃兼困脾氣陽氣不宣則畏冷口渴氣促喜臥法宜白虎承氣湯加減之用生石青小枳實知母生軍甘草粳米等藥問某壯男猝患氣喘汗出脈沉系何症治法如何曰壯男猝病非虛可知汗出脈沉陽明熱象喘乃陽明之熱蘊蒸於肺也法宜小承氣麻杏石膏湯加減之問某君頭痛身燒飲黑糖姜水覆被而臥醒則汗出頭痛解身略熱惟增喘脈浮治法如何曰風熱誤汗致邪蘊於肺故頭痛止而作喘法宜辛涼用生石膏炙杷葉鮮蘆根甘菊薄荷二花連翹等藥問某君脈遲緩胸痛嘔逆系何症治宜何法曰症系寒邪傷胃以致胸痛嘔逆而脈遲緩法宜寬中溫胃散寒降逆之劑法半夏錢半陳皮三錢白朮三錢厚朴二錢木香一錢茯苓三錢生薑三錢砂仁六分炙甘草一錢問舒母年七十熱病已愈惟腰及脊骨作痛何藥治之曰法宜養陰潤下活血生軍現不可用問面部及頸項起小粟作癢宜何法治之曰症系風濕法宜貯荊芥於袋中用以擦癢或用花露水擦之問外科治法消托二者以為何宜曰外科之法雖分陰陽往往以托法為上不知治外科當以消法為主托法次之主治分陰陽審虛實調氣血為其常法但身壯之人雖潰亦可用消法能使速痊身虛者用托法不過較消法略遲耳消法不能離軍托法不能離耆主治熱盛血虛可以鮮生地代耆惟金銀花無論消托皆當用之問針法補泄曰針法補泄以呼吸定之為正法以左右定之為偏法人之五臟除脾居中權外肺當在右肝當在左肝既在左腎必屬焉肺既在右心必屬焉吸則肝腎主之故左主降呼則心肺主之故右主升此左降右升之理婦科六則問婦人年未五十經血不行腹大而動兩脈滑動逾十月為疾為孕於何證之曰以乳脹否為斷乳不脹則宜舒氣活血乳脹則宜舒氣養血問某婦腹大而動經水不行已及一年按之腹軟何藥治之曰症似氣滯如乳不脹而脈數宜用鬱金杷葉蘆根葶藶脈不數則沉香木香皆可用惟恐臌症已成則收效非易矣問某婦經水不行已逾一月身燒腹大口渴思涼其症為何曰太陰大傷則脾失運化肺失升降如升降作用尚未全失大小便通利可治不通利則不治其口渴思涼亦肺氣不能化液之故與熱病之口渴思涼不同問康氏年逾四十經閉已及十月午後作燒飲食即嘔腹脅脹痛青筋外露咳嗽胸滿口渴唇焦身倦便溏溺黃此何病治宜何法曰肝旺血虛脾胃已傷期以六月無法醫治問某婦年近五旬素日經水逾期心常煩跳口乾渴頭暈腹有條塊脈細弱而弦此何症治宜何法曰脾氣虛弱致失運化之力不能運血下行故經水逾期血既不以時下久留成聚阻隔氣道故心煩跳乃氣不養於中焦也口乾渴頭暈乃氣不能運液上達潤咽榮頭也脈細弱乃脾氣不能運胃氣使肺氣達於寸口也脈弦乃血聚阻隔氣道也治法當用潞黨參白朮為君以補脾肉桂陳皮為臣以化瘀當歸川芎為佐以潤咽榮頭助參朮之力用茯神檳榔為使茯神使當歸白朮以助脾氣而去心煩跳檳榔使當歸以燥其濕潤之性俾專奏溫化之功用伏龍肝為引以土引藥入脾治經血不調趕前帶下善後丸藥方西洋參一錢生牡蠣六錢真阿膠三錢粉丹皮三錢白朮錢半杭白芍六錢白敗龜板六錢生鱉甲六錢全當歸四錢川芎三錢建曲四錢炒麥芽三錢楂炭四錢桃仁四分火麻仁四錢金斛六錢鬱金四錢鮮生地四兩雞血藤膏八錢蓋母膏八錢溶化鮮藕汁四兩以上各藥共為細末煉蜜為丸每丸錢半空心服之兒科二則問某兒年二歲尿道不通小便及腎囊皆腫以田螺法治之愈腫此何病治宜何法曰濕熱下注壅塞不通現情甚危西法較速中法用田雞活剝其皮而以皮貼於腫部內服利水藥略佐升提問某女年十歲口渴齒枯唇白焦舌華便燥溺短腹痛目微赤四肢串痛足不能行身皮甲錯此何病治宜何法曰滯熱日久胃液大傷正氣已虛攻之不可補之不能危險有日不可治矣論藥論藥之性宜審氣之厚薄味之甘辛質之輕重及生長之時候然後定寒熱評功能則乾鮮炮製不學可知其變化及相畏相反相助皆不離生克之理亦不問可知若不察其本僅記某藥寒某藥熱或畏某藥或喜某藥或反某藥及某藥治某病不特不能知變化性能設執一書中未載之草木或金石問治何病必膛然無所答觀藥品芳腐之濃淡則氣之厚薄分辨甘辛之輕重則味之厚薄定察質地結合之空密虛實則體量之輕重知藥味之性因干鮮而多不同石斛干鮮尚不甚差人參生地則不然石斛干鮮色俱黃人參干則色微黃鮮則色白潤生地干則色純黑鮮則色黃白石斛色不變故性亦不變人參生地色既異性豈能同乎有如人乳鮮則色白其性平經日曝則色紅其性大熱即此理也凡藥皆俱毒性人第知黃耆生地為上品然投黃耆於病溫者投生地於虛寒者或血寒者實足以殺之砒石水銀人皆知為大毒然投砒石於脾寒者投水銀於骨中毒者立收起死回生之效故有病必須服藥無病萬不可服藥蓋無藥不毒以毒攻毒則利人無毒招毒則禍人也問軍咀軍炭各於何種病為宜曰凡血瘀者宜用咀停滯者宜用炭問半夏之效用曰升降疏轉陽氣問溫病痧疹有用桃仁泥或不用之別何也曰凡色不正血未暢行者宜用桃仁泥用藥於小節亦宜慎醫者用藥往往苦寒而加甘寒或甘寒而加苦寒皆由佐使不甚得法例如有濕則二冬不可用陰虛無濕則苓連不可用否則佐使小失雖服者未必增病亦於愈期之遲速有關某醫慣將生地二冬芩連等藥同方並用因發此訓中藥與西藥中藥與西藥不同有志之士恆主用制西藥法以制中藥用意固善但西藥吾雖不知以理度之皆取其一種質或一種液而已中藥則不然以氣之芳臭色之黑白味之甘鹹質之輕重液之多寡而定其功用若以西法提取之則成分已差效用必異變中藥為西藥殊不易也然西藥若未經提取亦未嘗不可為湯劑
